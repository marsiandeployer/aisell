    .invoice-table tr:first-child td { border-top: none; }
    .badge-sent { background: #dbeafe; color: #1d4ed8; }
    .badge-paid { background: #d1fae5; color: #065f46; }
    .badge-overdue { background: #fee2e2; color: #991b1b; }
    .badge-draft { background: #f3f4f6; color: #6b7280; }

    </div>
  </div>

function navigateTo(page) {
  _currentPage = page;
  var main = document.getElementById('mainContent');
  main.innerHTML = pages[page]();

  // Update active nav
  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    if (btn.dataset.nav === 'nav' + page.charAt(0).toUpperCase() + page.slice(1)) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });

  if (page === 'create') {
    // Initialize the create page
    renderAll();
    // Re-attach scroll hide for prompt bar
    var _lastScroll = 0;
    var _bar = document.getElementById('promptBar');
    var _panel = document.getElementById('previewPanel');
    if (_panel && _bar) {
      _panel.addEventListener('scroll', function() {
        var st = _panel.scrollTop;
        _bar.style.transform = (st > _lastScroll && st > 40) ? 'translateY(100%)' : 'translateY(0)';
        _lastScroll = st;
      });
    }
  }
}

// ============================================================
// Date helpers
// ============================================================
function formatDate(dateStr, fmt) {
  var parts = dateStr.split('-');
  if (parts.length !== 3) return dateStr;
  var y = parts[0], m = parts[1], d = parts[2];
  if (fmt === 'MM/DD/YYYY') return m + '/' + d + '/' + y;
  if (fmt === 'DD/MM/YYYY') return d + '/' + m + '/' + y;
  if (fmt === 'DD.MM.YYYY') return d + '.' + m + '.' + y;
  return y + '-' + m + '-' + d;
}

function addDays(dateStr, days) {
  var d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

var _today = '2026-02-25';

// ============================================================
// Number formatting
// ============================================================
function fmtMoney(amount, c) {
  var n = Math.abs(amount);
  if (c.currency === 'RUB') {
    return n.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ' + c.symbol;
  }
  if (c.currency === 'AED') {
    return c.symbol + ' ' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  if (c.currency === 'EUR') {
    return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ' + c.symbol;
  }
  return c.symbol + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

    '</div>';
}

function formSelect(label, id, options, selected) {
  var opts = options.map(function(o) {
    return '<option value="' + escHtml(o) + '"' + (o === selected ? ' selected' : '') + '>' + escHtml(o) + '</option>';

  return '<div>' +
    '<label class="form-label">' + escHtml(label) + '</label>' +
    '<select class="form-input form-select" id="field_' + id + '" onchange="updatePreview()">' + opts + '</select>' +
    '</div>';
}

function escHtml(s) {
  if (typeof s !== 'string') s = String(s || '');

  html += '<th style="text-align:center;padding:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;width:50px">' + (c.id === 'de' ? 'Anz.' : (c.id === 'ru' ? 'КОЛ.' : tt('qty').toUpperCase())) + '</th>';
  html += '<th style="text-align:right;padding:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;width:110px">' + (c.id === 'de' ? 'Einzelpreis' : (c.id === 'ru' ? 'ЦЕНА' : tt('unitPrice').toUpperCase())) + '</th>';
  html += '<th style="text-align:right;padding:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;width:110px">' + (c.id === 'de' ? 'Betrag' : (c.id === 'ru' ? 'СУММА' : tt('amount').toUpperCase())) + '</th>';
  html += '</tr></thead>';
  html += '<tbody>';
  items.forEach(function(it, i) {
    var rowBg = i % 2 === 1 ? 'background:#f9fafb;' : '';
    html += '<tr style="' + rowBg + '">';
    html += '<td style="padding:10px;font-size:13px;color:#1f2937">' + escHtml(it.description) + '</td>';
    html += '<td style="padding:10px;font-size:13px;color:#4b5563;text-align:center">' + it.qty + '</td>';
    html += '<td style="padding:10px;font-size:13px;color:#4b5563;text-align:right">' + fmtMoney(it.unitPrice, c) + '</td>';
    html += '<td style="padding:10px;font-size:13px;color:#111827;font-weight:600;text-align:right">' + fmtMoney(it.qty * it.unitPrice, c) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  html += '</div>';

  // Totals
  html += '<div style="padding:0 32px 20px;display:flex;justify-content:flex-end">';
  html += '<div style="min-width:260px">';
  html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #f3f4f6">';
  html += '<span style="font-size:13px;color:#6b7280">' + (c.id === 'de' ? 'Nettobetrag' : (c.id === 'ru' ? 'Итого без НДС' : tt('subtotal'))) + '</span>';
  html += '<span style="font-size:13px;color:#374151;font-weight:600">' + fmtMoney(subtotal, c) + '</span>';
  html += '</div>';
  var taxLabel = c.id === 'de' ? ('MwSt. ' + c.taxRateLabel) : (c.id === 'ru' ? ('НДС ' + c.taxRateLabel) : (c.taxName + ' ' + c.taxRateLabel));
  html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #f3f4f6">';
  html += '<span style="font-size:13px;color:#9ca3af">' + taxLabel + '</span>';
  html += '<span style="font-size:13px;color:#9ca3af">' + fmtMoney(taxAmt, c) + '</span>';
  html += '</div>';
  html += '<div style="display:flex;justify-content:space-between;padding:12px 16px;margin-top:4px;background:' + c.color + ';border-radius:8px">';
  html += '<span style="font-size:14px;font-weight:700;color:#fff">' + (c.id === 'de' ? 'Gesamtbetrag (inkl. MwSt.)' : (c.id === 'ru' ? 'ИТОГО К ОПЛАТЕ' : tt('total').toUpperCase())) + '</span>';
  html += '<span style="font-size:16px;font-weight:800;color:#fff">' + fmtMoney(total, c) + '</span>';
  html += '</div>';
  html += '</div>';
  html += '</div>';

  if (c.id === 'ru') {
    html += '<div style="padding:0 32px 12px">';
    html += '<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:10px 14px;font-size:12px;color:#92400e">';
    html += '<span style="font-weight:700">Основание:</span> Договор №2026-01/ТС от 10.01.2026 г.'; // cyrillic-ok
    html += '</div></div>';
  }

  if (notes) {
    html += '<div style="padding:0 32px 24px">';
    html += '<div style="border-top:1px solid #f3f4f6;padding-top:14px">';
    html += '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#9ca3af;margin-bottom:6px">' + (c.id === 'de' ? 'HINWEISE' : (c.id === 'ru' ? 'ПРИМЕЧАНИЯ' : 'NOTES & TERMS')) + '</div>';
    html += '<div style="font-size:11.5px;color:#6b7280;line-height:1.6">' + escHtml(notes) + '</div>';
    html += '</div></div>';
  }

  html += '<div style="padding:14px 32px;background:#f9fafb;border-top:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center">';
  html += '<div style="font-size:10px;color:#9ca3af">' + escHtml(fromCompany) + ' &mdash; ' + escHtml(fromEmail) + '</div>';
  html += '<div style="font-size:10px;color:#9ca3af;font-weight:600">' + c.invoiceTitle + ' ' + escHtml(invNum) + '</div>';
  html += '</div>';

  html += '</div>'; // end invoice card
  return html;
}

// ============================================================
// Update preview
// ============================================================
function updatePreview() {
  var c = getCountry(_country);
  if (!c) return;
  var panel = document.getElementById('previewPanel');
  if (!panel) return;
  panel.innerHTML = '<div class="fade-in">' + renderInvoice(c, false) + '</div>';
  var badge = document.getElementById('statusBadge');
  if (badge) {
    var statusLabel = _status === 'SENT' ? tt('sent') : (_status === 'PAID' ? tt('paid') : tt('overdue'));
    badge.textContent = statusLabel;
    badge.className = 'px-2.5 py-1 rounded-full text-xs font-bold ' + (_status === 'SENT' ? 'badge-sent' : (_status === 'PAID' ? 'badge-paid' : 'badge-overdue'));
  }
}

function setStatus(s) {
  _status = s;
  var c = getCountry(_country);
  var fp = document.getElementById('formPanel');
  if (fp) fp.innerHTML = renderForm(c);
  updatePreview();
}

// ============================================================
// PDF overlay
// ============================================================
function generatePdf() {
  var c = getCountry(_country);
  document.getElementById('pdfContent').innerHTML = renderInvoice(c, true);
  document.getElementById('pdfOverlay').classList.add('active');
}
function closePdf() {
  document.getElementById('pdfOverlay').classList.remove('active');
}

// ============================================================
// Full re-render (create page)
// ============================================================
function renderAll() {
  var c = getCountry(_country);
  if (!c) return;

  renderTabs();

  var tabsLabel = document.getElementById('tabsLabel');
  if (tabsLabel) tabsLabel.textContent = tt('tabsLabel');
  var previewTitle = document.getElementById('previewTitle');
  if (previewTitle) previewTitle.textContent = tt('previewTitle');
  var previewSubtitle = document.getElementById('previewSubtitle');
  if (previewSubtitle) previewSubtitle.textContent = tt('previewSubtitle');
  var pdfBtn = document.getElementById('pdfBtn');
  if (pdfBtn) pdfBtn.innerHTML = '&#128438; ' + tt('generatePdf');

  var fp = document.getElementById('formPanel');
  if (fp) fp.innerHTML = renderForm(c);

  updatePreview();
}

// ============================================================
// Lang toggle
// ============================================================
function toggleLang() {
  _lang = _lang === 'ru' ? 'en' : 'ru';
  var langBtn = document.getElementById('langBtn');
  if (langBtn) langBtn.textContent = tt('langBtn');
  // Update sidebar nav labels
  updateNavLabels();
  // Re-navigate to refresh page content
  navigateTo(_currentPage);
}

function updateNavLabels() {
  var nc = document.getElementById('navCreate');
  if (nc) nc.textContent = tt('navCreate');
  var ni = document.getElementById('navInvoices');
  if (ni) ni.textContent = tt('navInvoices');
  var ns = document.getElementById('navSettings');
  if (ns) ns.textContent = tt('navSettings');
}

// ============================================================
// Prompt bar
// ============================================================
function updatePromptBar() {
  var prompt = tt('promptText');
  var btn = document.getElementById('ctaBtn');
  document.getElementById('promptText').textContent = prompt;
  btn.textContent = tt('ctaBtn');
  btn.href = '/?start=example_invoice-generator&prompt=' + encodeURIComponent(prompt);
  btn.onclick = function(e) {
    var insideIframe = false;
    try { insideIframe = window.parent && window.parent !== window; } catch (_e) {}
    if (insideIframe) {
      e.preventDefault();
      try {
        window.parent.postMessage({ type: 'open_webchat_prompt', prompt: prompt }, '*');
      } catch (_e) {}
      return;
    }
    var extId = '';
    try { extId = String(new URLSearchParams(window.location.search).get('ext_id') || '').trim(); } catch (_e) {}
    if (!extId) return;
    try {
      if (window.chrome && chrome.runtime && typeof chrome.runtime.sendMessage === 'function') {
        e.preventDefault();
        chrome.runtime.sendMessage(extId, { type: 'open_webchat_prompt', prompt: prompt });
      }
    } catch (_e) {}
  };
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  updatePromptBar();
  updateNavLabels();

  if (_isRuBrowser) {
    var lt = document.getElementById('langToggle');
    if (lt) lt.style.display = '';
    var lb = document.getElementById('langBtn');
    if (lb) lb.textContent = tt('langBtn');
  }

  navigateTo('create');
});
</script>
