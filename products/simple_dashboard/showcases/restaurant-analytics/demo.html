// ===== JIT data generators =====
function rnd(min, max) { return min + Math.random() * (max - min); }
function rndInt(min, max) { return Math.round(rnd(min, max)); }

function gen30DayRevenue() {
  var base = 3800, arr = [];
  for (var i = 0; i < 30; i++) {
    var dow = i % 7;
    var weekendBoost = (dow === 5 || dow === 6) ? 1.35 : 1.0;
    arr.push(Math.round(base * weekendBoost * rnd(0.82, 1.18)));
  }
  return arr;
}

function gen30DayLabels() {
  var months = tt('months').split ? ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'] : tt('months');
  // use array directly
  months = (_s[_lang] || _s.en).months;
  var labels = [], now = new Date();
  for (var i = 29; i >= 0; i--) {
    var d = new Date(now); d.setDate(d.getDate() - i);
    labels.push(d.getDate() + ' ' + months[d.getMonth()]);
  }
  return labels;
}

];
var PRICES = [14, 3.5, 5, 11, 8, 7, 12, 5.5, 9, 13, 8, 7, 3, 10, 9];
var COSTS  = [0.34, 0.22, 0.25, 0.30, 0.38, 0.45, 0.32, 0.26, 0.40, 0.35, 0.48, 0.36, 0.20, 0.29, 0.42];

function genMenuData() {
  var items = _lang === 'ru' ? MENU_ITEMS_RU : MENU_ITEMS_EN;
  return items.map(function(item, i) {
    var orders = rndInt(40, 280);
    var price = PRICES[i];
    var costPct = COSTS[i] + rnd(-0.04, 0.04);
    var margin = Math.round((1 - costPct) * 100);
    return { name: item.name, cat: item.cat, orders: orders, revenue: Math.round(orders * price), margin: margin };
  });
}

function genHeatmap() {
  // rows = hours 6..23, cols = Mon..Sun
  var data = [];
  for (var h = 6; h <= 23; h++) {
    var row = [];
    for (var d = 0; d < 7; d++) {
      var base = 0;
      // lunch peak 12-14, dinner peak 18-21
      if (h >= 12 && h <= 14) base = rnd(55, 90);
      else if (h >= 18 && h <= 21) base = rnd(65, 100);
      else if (h >= 9 && h <= 11) base = rnd(20, 50);
      else if (h >= 15 && h <= 17) base = rnd(15, 40);
      else base = rnd(3, 18);
      // weekend boost
      if (d >= 5) base *= rnd(1.2, 1.45);
      row.push(Math.round(Math.min(base, 100)));
    }
    data.push(row);
  }
  return data;
}

function genHourlyOrders() {
  var arr = [];
  for (var h = 6; h <= 23; h++) {
    var v = 0;
    if (h >= 12 && h <= 14) v = rndInt(40, 80);
    else if (h >= 18 && h <= 21) v = rndInt(55, 90);
    else if (h >= 9 && h <= 11) v = rndInt(15, 40);
    else v = rndInt(2, 18);
    arr.push(v);
  }
  return arr;
}

function gen12MonthRevenue() {
  var base = 85000, arr = [];
  for (var i = 0; i < 12; i++) {
    arr.push(Math.round(base * rnd(0.85, 1.15)));
    base *= 1.02;
  }
  return arr;
}

function heatmapColor(v) {
  if (v < 15) return '#fff7ed';
  if (v < 30) return '#fed7aa';
  if (v < 50) return '#fb923c';
  if (v < 70) return '#ea580c';
  return '#9a3412';
}
function heatmapTextColor(v) { return v >= 50 ? '#fff' : '#374151'; }

// ===== KPI card builder =====
function kpiCard(label, value, trend, isGood) {
  var arrow = isGood ? '↑' : '↓';
  var trendColor = isGood ? 'text-green-600' : 'text-red-500';
  return '<div class="kpi-card bg-white rounded-xl shadow p-4 flex flex-col gap-1">'
    + '<div class="text-xs text-gray-500 font-medium uppercase tracking-wide">' + label + '</div>'
    + '<div class="text-2xl font-bold text-gray-900">' + value + '</div>'
    + '<div class="text-xs ' + trendColor + ' font-semibold">' + arrow + ' ' + trend + ' <span class="text-gray-400 font-normal">' + tt('vsYesterday') + '</span></div>'
    + '</div>';
}

  var yOrders = rndInt(55, 95);
  var avgCheck = Math.round(todayRev / orders);
  var tables = rndInt(28, 44);
  var cur = tt('currency');

  var cats = [tt('catCoffee'), tt('catFood'), tt('catDesserts'), tt('catAlcohol'), tt('catOther')];
  var catColors = ['#92400e','#f59e0b','#fb7185','#dc2626','#6b7280'];

  var menuData = genMenuData().sort(function(a,b){return b.orders-a.orders;}).slice(0,8);
  var labels30 = gen30DayLabels();

  return '<div class="p-5">'
    + '<h2 class="text-xl font-bold text-gray-800 mb-4">' + tt('iconOverview') + ' ' + tt('navOverview') + '</h2>'
    + '<div class="grid grid-cols-4 gap-3 mb-5">'
    + kpiCard(tt('kpiDailyRevenue'), cur + todayRev.toLocaleString(), cur + Math.abs(todayRev - yestRev), todayRev >= yestRev)
    + kpiCard(tt('kpiOrdersToday'), orders, Math.abs(orders - yOrders), orders >= yOrders)
    + kpiCard(tt('kpiAvgCheck'), cur + avgCheck, cur + rndInt(1,5), Math.random() > 0.35)
    + kpiCard(tt('kpiTablesTurned'), tables, rndInt(1,4), Math.random() > 0.4)

    + '<div class="grid grid-cols-3 gap-4">'

    + kpiCard(tt('kpiTotalItems'), menuData.length, '0', true)
    + kpiCard(tt('kpiBestSeller'), bestSeller.split(' ').slice(0,2).join(' '), '', true)
    + kpiCard(tt('kpiAvgMargin'), avgMargin + '%', rndInt(1,3) + '%', Math.random() > 0.4)
    + kpiCard(tt('kpiSlowMovers'), slowMovers, rndInt(0,2), slowMovers <= 3)
    + '</div>'
    + '<div class="grid grid-cols-3 gap-4">'
    + '<div class="bg-white rounded-xl shadow p-4"><div class="text-sm font-semibold text-gray-700 mb-3">' + tt('chartOrdersByCat') + '</div><canvas id="catBarChart" height="180"></canvas></div>'
    + '<div class="col-span-2 bg-white rounded-xl shadow p-4"><div class="text-sm font-semibold text-gray-700 mb-2">' + tt('tableTitle') + '</div>'
    + '<div class="overflow-auto" style="max-height:260px"><table class="w-full"><thead><tr class="bg-gray-50 text-xs text-gray-500 uppercase">'
    + '<th class="py-2 px-3 text-left">' + tt('colItem') + '</th><th class="py-2 px-3 text-left">' + tt('colCategory') + '</th>'
    + '<th class="py-2 px-3 text-left">' + tt('colOrders') + '</th><th class="py-2 px-3 text-left">' + tt('colRevenue') + '</th>'
    + '<th class="py-2 px-3 text-left">' + tt('colMargin') + '</th>'
    + '</tr></thead><tbody>' + rows + '</tbody></table></div></div>'
    + '</div></div>';
}

function renderMenuCharts() {
  var cats = [tt('catCoffee'), tt('catFood'), tt('catDesserts'), tt('catAlcohol'), tt('catOther')];
  var catColors = ['#92400e','#f59e0b','#fb7185','#dc2626','#6b7280'];
  var catVals = cats.map(function(){ return rndInt(60,250); });
  new Chart(document.getElementById('catBarChart'), {
    type: 'bar',
    data: {
      labels: cats,
      datasets: [{ label: tt('labelOrders'), data: catVals, backgroundColor: catColors, borderRadius: 5 }]
    },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } } }
  });
}

function pagePeakHours() {
  var hmap = genHeatmap();
  var hours = [];
  for (var h = 6; h <= 23; h++) { hours.push(h < 12 ? h + 'am' : h === 12 ? '12pm' : (h-12) + 'pm'); }
  var days = (_s[_lang] || _s.en).days;

  // find busiest slot
  var maxV = 0, maxH = 12, maxD = 4;
  hmap.forEach(function(row, hi) { row.forEach(function(v, di) { if(v > maxV){ maxV=v; maxH=hi+6; maxD=di; } }); });
  var busiestHourStr = (maxH < 12 ? maxH+'am' : maxH===12?'12pm':(maxH-12)+'pm') + '–' + ((maxH+1) < 12 ? (maxH+1)+'am' : (maxH+1)===12?'12pm':((maxH+1)-12)+'pm');

  var heatmapRows = hmap.map(function(row, hi) {
    var cells = row.map(function(v, di) {
      var bg = heatmapColor(v);
      var fg = heatmapTextColor(v);
      return '<td class="heatmap-cell" style="background:' + bg + ';color:' + fg + ';width:42px;height:28px;text-align:center;font-size:11px;font-weight:600;border:1px solid rgba(0,0,0,0.05)">' + v + '</td>';
    }).join('');
    return '<tr><td style="font-size:11px;color:#6b7280;padding-right:8px;white-space:nowrap">' + hours[hi] + '</td>' + cells + '</tr>';
  }).join('');

  var headCells = days.map(function(d){ return '<th style="font-size:11px;color:#6b7280;font-weight:600;width:42px;text-align:center;padding-bottom:4px">' + d + '</th>'; }).join('');

  return '<div class="p-5">'
    + '<h2 class="text-xl font-bold text-gray-800 mb-4">' + tt('iconPeakHours') + ' ' + tt('navPeakHours') + '</h2>'
    + '<div class="grid grid-cols-3 gap-3 mb-5">'
    + kpiCard(tt('kpiBusiestHour'), busiestHourStr, '', true)
    + kpiCard(tt('kpiPeakDay'), days[maxD], '', true)
    + kpiCard(tt('kpiAvgWait'), rndInt(7,18) + ' ' + tt('min'), rndInt(1,3) + ' ' + tt('min'), false)
    + '</div>'
    + '<div class="grid grid-cols-2 gap-4">'
    + '<div class="bg-white rounded-xl shadow p-4"><div class="text-sm font-semibold text-gray-700 mb-3">' + tt('heatmapTitle') + '</div>'
    + '<div class="overflow-auto"><table><thead><tr><th></th>' + headCells + '</tr></thead><tbody>' + heatmapRows + '</tbody></table></div></div>'
    + '<div class="bg-white rounded-xl shadow p-4"><div class="text-sm font-semibold text-gray-700 mb-3">' + tt('chartHourlyOrders') + '</div><canvas id="hourlyChart" height="220"></canvas></div>'
    + '</div></div>';
}

function renderPeakCharts() {
  var hourlyOrders = genHourlyOrders();
  var hours = [];
  for (var h = 6; h <= 23; h++) { hours.push(h < 12 ? h + 'am' : h === 12 ? '12pm' : (h-12) + 'pm'); }
  var colors = hourlyOrders.map(function(v){ return v >= 55 ? '#dc2626' : v >= 40 ? '#f59e0b' : '#fcd34d'; });
  new Chart(document.getElementById('hourlyChart'), {
    type: 'bar',
    data: {
      labels: hours,
      datasets: [{ label: tt('labelOrders'), data: hourlyOrders, backgroundColor: colors, borderRadius: 4 }]
    },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 10 } } }, y: { ticks: { font: { size: 10 } } } } }
  });
}

function pageFinance() {
  var months = (_s[_lang] || _s.en).months;
  var rev12 = gen12MonthRevenue();
  var monthlyRev = rev12[rev12.length - 1];
  var foodCostPct = rndInt(28, 35);
  var laborPct = rndInt(22, 28);
  var netMargin = 100 - foodCostPct - laborPct - rndInt(8, 12);
  var cur = tt('currency');

  var catLabels = [tt('catCoffee'), tt('catFood'), tt('catDesserts'), tt('catAlcohol'), tt('catOther')];
  var catCosts = catLabels.map(function(){ return rndInt(18, 42); });

  return '<div class="p-5">'
    + '<h2 class="text-xl font-bold text-gray-800 mb-4">' + tt('iconFinance') + ' ' + tt('navFinance') + '</h2>'
    + '<div class="grid grid-cols-4 gap-3 mb-5">'
    + kpiCard(tt('kpiMonthRevenue'), cur + monthlyRev.toLocaleString(), cur + rndInt(2000,8000).toLocaleString(), true)
    + kpiCard(tt('kpiFoodCost'), foodCostPct + '%', rndInt(1,3) + '%', false)
    + kpiCard(tt('kpiLaborCost'), laborPct + '%', rndInt(0,2) + '%', Math.random() > 0.5)
    + kpiCard(tt('kpiNetMargin'), netMargin + '%', rndInt(1,2) + '%', Math.random() > 0.4)
    + '</div>'
    + '<div class="grid grid-cols-2 gap-4">'
    + '<div class="bg-white rounded-xl shadow p-4"><div class="text-sm font-semibold text-gray-700 mb-3">' + tt('chartRevVsCosts') + '</div><canvas id="revCostChart" height="180"></canvas></div>'
    + '<div class="bg-white rounded-xl shadow p-4"><div class="text-sm font-semibold text-gray-700 mb-3">' + tt('chartCostBreakdown') + '</div><canvas id="costBreakdownChart" height="180"></canvas></div>'
    + '</div></div>';
}

function renderFinanceCharts() {
  var months = (_s[_lang] || _s.en).months;
  var rev12 = gen12MonthRevenue();
  var food12 = rev12.map(function(v){ return Math.round(v * rnd(0.28, 0.35)); });
  var labor12 = rev12.map(function(v){ return Math.round(v * rnd(0.22, 0.28)); });
  var other12 = rev12.map(function(v){ return Math.round(v * rnd(0.08, 0.12)); });

  new Chart(document.getElementById('revCostChart'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [
        { label: tt('labelRevenue'), data: rev12, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.08)', tension: 0.3, fill: true, pointRadius: 3 },
        { label: tt('labelFoodCostL'), data: food12, borderColor: '#dc2626', backgroundColor: 'transparent', tension: 0.3, borderDash: [4,3], pointRadius: 2 },
        { label: tt('labelLaborCostL'), data: labor12, borderColor: '#7c3aed', backgroundColor: 'transparent', tension: 0.3, borderDash: [4,3], pointRadius: 2 }
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12 } } }, scales: { x: { ticks: { font: { size: 10 } } }, y: { ticks: { font: { size: 10 } } } } }
  });

  var catLabels = [tt('catCoffee'), tt('catFood'), tt('catDesserts'), tt('catAlcohol'), tt('catOther')];
  var catCosts = catLabels.map(function(){ return rndInt(18, 42); });
  new Chart(document.getElementById('costBreakdownChart'), {
    type: 'bar',
    data: {
      labels: catLabels,
      datasets: [{ label: tt('labelFoodCostL') + ' %', data: catCosts, backgroundColor: ['#92400e','#f59e0b','#fb7185','#dc2626','#6b7280'], borderRadius: 5 }]
    },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 10 } } }, y: { ticks: { font: { size: 10 }, callback: function(v){ return v+'%'; } } } } }
  });
}

// ===== SPA router =====
var currentPage = 'overview';
var PAGES = {
  overview:   { render: pageOverview,   charts: renderOverviewCharts },
  menu:       { render: pageMenu,       charts: renderMenuCharts },
  peak_hours: { render: pagePeakHours,  charts: renderPeakCharts },
  finance:    { render: pageFinance,    charts: renderFinanceCharts }
};

function navigateTo(page) {
  if (!PAGES[page]) page = 'overview';
  currentPage = page;
  document.getElementById('mainContent').innerHTML = PAGES[page].render();
  document.querySelectorAll('.nav-link').forEach(function(el) {
    if (el.dataset.page === page) { el.classList.add('active'); }
    else { el.classList.remove('active'); }
  });
  setTimeout(function() { PAGES[page].charts(); }, 50);
}

function renderSidebar() {
  document.getElementById('sidebarTitle').textContent = tt('sidebarTitle');
  document.getElementById('sidebarSubtitle').textContent = tt('sidebarSubtitle');
  var navDefs = [
    { page: 'overview',   icon: 'iconOverview',   label: 'navOverview' },
    { page: 'menu',       icon: 'iconMenu',        label: 'navMenu' },
    { page: 'peak_hours', icon: 'iconPeakHours',   label: 'navPeakHours' },
    { page: 'finance',    icon: 'iconFinance',     label: 'navFinance' }
  ];
  document.querySelectorAll('.nav-link').forEach(function(el, i) {
    if (navDefs[i]) {
      el.innerHTML = '<span>' + tt(navDefs[i].icon) + '</span><span>' + tt(navDefs[i].label) + '</span>';
      el.dataset.page = navDefs[i].page;
    }
  });
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', function() {
  renderSidebar();

  if (_isRuBrowser) {
    document.getElementById('langToggle').style.display = '';
    document.getElementById('langBtn').textContent = _lang === 'ru' ? 'Русский' : 'English';
  }

  document.getElementById('promptText').textContent = tt('promptText');
  document.getElementById('ctaBtn').textContent = tt('ctaLabel');

  navigateTo('overview');
});
</script>
</body>
</html>
