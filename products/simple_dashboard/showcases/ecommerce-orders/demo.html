// ===== JIT DATA GENERATORS =====

function rnd(min, max) { return Math.round(min + Math.random() * (max - min)); }
function rndF(min, max, dec) { return parseFloat((min + Math.random() * (max - min)).toFixed(dec)); }

function gen30DayOrders() {
  var data = [];
  var base = 280;
  for (var i = 0; i < 30; i++) {
    var dow = (i + 1) % 7; // 0=Mon
    var weekendBoost = (dow === 5 || dow === 6) ? 1.35 : 1.0;
    var noise = 0.8 + Math.random() * 0.4;
    data.push(Math.round(base * weekendBoost * noise));
  }
  return data;
}

function gen30DayLabels() {
  var labels = [];
  var now = new Date();
  for (var i = 29; i >= 0; i--) {
    var d = new Date(now);
    d.setDate(d.getDate() - i);
    labels.push((d.getMonth() + 1) + '/' + d.getDate());
  }
  return labels;
}

function gen30DayReturns() {
  var orders = gen30DayOrders();
  return orders.map(function(o) { return Math.round(o * (0.08 + Math.random() * 0.06)); });
}

function genProductRevenues() {
  var base = [48000, 39000, 34000, 28500, 26000, 23000, 20500, 18000, 15500, 13000, 10500, 8500];
  return base.map(function(v) { return Math.round(v * (0.85 + Math.random() * 0.3)); });
}

function genInventoryStocks() {
  return [
    rnd(120, 400), rnd(5, 35), rnd(80, 250), rnd(0, 8),
    rnd(50, 200), rnd(0, 5), rnd(30, 150), rnd(15, 60),
    rnd(0, 12), rnd(70, 300), rnd(25, 90), rnd(3, 18)
  ];
}

function stockStatus(qty) {
  if (qty === 0) return 'out';
  if (qty < 15) return 'low';
  return 'in';
}

function genChannelOrders30() {
  var days = 30;
  var organic = [], paid = [], social = [], direct = [];
  for (var i = 0; i < days; i++) {
    var total = rnd(180, 420);
    organic.push(Math.round(total * 0.35));
    paid.push(Math.round(total * 0.28));
    social.push(Math.round(total * 0.22));
    direct.push(Math.round(total * 0.15));
  }
  return { organic: organic, paid: paid, social: social, direct: direct };
}

// ===== SPA NAVIGATION =====
var currentPage = 'overview';
var _charts = {};

function destroyCharts() {
  Object.keys(_charts).forEach(function(k) { try { _charts[k].destroy(); } catch(_e) {} });
  _charts = {};
}

function kpiCard(label, value, sub, subClass) {
  return '<div class="kpi-card rounded-xl p-4 shadow-sm">' +
    '<div class="text-xs text-gray-500 font-medium mb-1">' + label + '</div>' +
    '<div class="text-2xl font-bold text-gray-800">' + value + '</div>' +
    '<div class="text-xs mt-1 ' + (subClass || 'text-gray-400') + '">' + sub + '</div>' +
  '</div>';
}

function sectionHeader(title) {
  return '<div class="flex items-center gap-2 mb-3"><h2 class="text-sm font-semibold text-gray-700">' + title + '</h2></div>';
}

// ===== PAGES =====

function pageOverview() {
  var ordersToday = rnd(180, 420);
  var revenueToday = rnd(8000, 22000);
  var aov = rndF(45, 85, 2);
  var conv = rndF(2.4, 3.8, 1);

  var ordChange = rnd(-8, 18);
  var revChange = rnd(-5, 22);
  var aovChange = rndF(-3, 6, 1);
  var convChange = rndF(-0.3, 0.5, 1);

  var ordSign = ordChange >= 0 ? '+' : '';
  var revSign = revChange >= 0 ? '+' : '';
  var aovSign = aovChange >= 0 ? '+' : '';
  var convSign = convChange >= 0 ? '+' : '';

  var ordClass = ordChange >= 0 ? 'text-emerald-600' : 'text-red-500';
  var revClass = revChange >= 0 ? 'text-emerald-600' : 'text-red-500';
  var aovClass = aovChange >= 0 ? 'text-emerald-600' : 'text-red-500';
  var convClass = convChange >= 0 ? 'text-emerald-600' : 'text-red-500';

  return '<div class="p-5 fade-in">' +
    '<h1 class="text-lg font-bold text-gray-800 mb-4">' + tt('navOverview') + '</h1>' +
    '<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">' +
      kpiCard(tt('kpiOrdersToday'), ordersToday.toLocaleString(), ordSign + ordChange + '% ' + tt('vs'), ordClass) +
      kpiCard(tt('kpiRevenueToday'), '$' + revenueToday.toLocaleString(), revSign + revChange + '% ' + tt('vs'), revClass) +
      kpiCard(tt('kpiAOV'), '$' + aov.toFixed(2), aovSign + aovChange + '% ' + tt('vs'), aovClass) +
      kpiCard(tt('kpiConversion'), conv + '%', convSign + convChange + 'pp ' + tt('vs'), convClass) +
    '</div>' +
    '<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">' +
      '<div class="lg:col-span-2 bg-white rounded-xl p-4 shadow-sm">' +
        sectionHeader(tt('chartOrdersTrend')) +
        '<canvas id="chartOrdersTrend" height="120"></canvas>' +
      '</div>' +
      '<div class="bg-white rounded-xl p-4 shadow-sm">' +
        sectionHeader(tt('chartRevenueCategory')) +
        '<canvas id="chartRevCat" height="200"></canvas>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function pageProducts() {
  var stocks = genInventoryStocks();
  var products = tt('products12');
  var revenues = genProductRevenues();

  var topSkuOrders = rnd(420, 890);
  var lowAlerts = stocks.filter(function(s) { return s < 15; }).length;
  var avgMargin = rndF(28, 46, 1);
  var retRate = rndF(8, 14, 1);

  var rows = '';
  for (var i = 0; i < products.length; i++) {
    var qty = stocks[i];
    var stat = stockStatus(qty);
    var badgeClass = stat === 'in' ? 'badge-green' : (stat === 'low' ? 'badge-yellow' : 'badge-red');
    var statusLabel = stat === 'in' ? tt('statusInStock') : (stat === 'low' ? tt('statusLow') : tt('statusOut'));
    rows += '<tr class="border-b border-gray-100 hover:bg-teal-50/30 transition">' +
      '<td class="py-2 px-3 text-xs text-gray-700">' + products[i] + '</td>' +
      '<td class="py-2 px-3 text-xs text-gray-600 text-right">' + qty + '</td>' +
      '<td class="py-2 px-3 text-right"><span class="badge ' + badgeClass + '">' + statusLabel + '</span></td>' +
    '</tr>';
  }

  return '<div class="p-5 fade-in">' +
    '<h1 class="text-lg font-bold text-gray-800 mb-4">' + tt('navProducts') + '</h1>' +
    '<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">' +
      kpiCard(tt('kpiTopSkuOrders'), topSkuOrders.toLocaleString(), tt('days30'), 'text-gray-400') +
      kpiCard(tt('kpiLowStockAlerts'), lowAlerts, lowAlerts > 3 ? '&#9888; critical' : 'OK', lowAlerts > 3 ? 'text-red-500 font-semibold' : 'text-emerald-600') +
      kpiCard(tt('kpiAvgMargin'), avgMargin + '%', rndF(-2, 4, 1) + 'pp ' + tt('vs'), 'text-emerald-600') +
      kpiCard(tt('kpiReturnRate'), retRate + '%', '+' + rndF(0.1, 1.2, 1) + 'pp ' + tt('vs'), 'text-amber-600') +
    '</div>' +
    '<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">' +
      '<div class="lg:col-span-2 bg-white rounded-xl p-4 shadow-sm">' +
        sectionHeader(tt('chartTopProducts')) +
        '<canvas id="chartTopProducts" height="260"></canvas>' +
      '</div>' +
      '<div class="bg-white rounded-xl p-4 shadow-sm overflow-auto mini-scroll" style="max-height:360px">' +
        sectionHeader(tt('tableInventory')) +
        '<table class="w-full text-left">' +
          '<thead><tr class="border-b border-gray-200">' +
            '<th class="py-1.5 px-3 text-xs font-semibold text-gray-500">' + tt('colProduct') + '</th>' +
            '<th class="py-1.5 px-3 text-xs font-semibold text-gray-500 text-right">' + tt('colStock') + '</th>' +
            '<th class="py-1.5 px-3 text-xs font-semibold text-gray-500 text-right">' + tt('colStatus') + '</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>' +
    '</div>' +
  '</div>';
}

  var products = tt('products12');

  _charts.topProducts = new Chart(document.getElementById('chartTopProducts'), {
    type: 'bar',
    data: {
      labels: top10,
      datasets: [{
        label: tt('revenue'),

        backgroundColor: revenues.map(function(v, i) {

function pageChannels() {

  var sumDirect = chanData.direct.reduce(function(a, b) { return a + b; }, 0);

  var cOrganic = rndF(3.1, 4.2, 1);
  var cPaid = rndF(2.0, 3.2, 1);
  var cSocial = rndF(1.4, 2.6, 1);
  var cDirect = rndF(3.8, 5.2, 1);
  var cEmail = rndF(4.5, 6.1, 1);

  return '<div class="p-5 fade-in">' +

      kpiCard(tt('kpiPaid'), sumPaid.toLocaleString(), tt('days30'), 'text-gray-400') +
      kpiCard(tt('kpiSocial'), sumSocial.toLocaleString(), tt('days30'), 'text-gray-400') +

    '</div>' +
    '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">' +

      '</div>' +

function renderChartsChannels() {
  var labels = gen30DayLabels();
  var chanData = genChannelOrders30();

  // Downsample to weekly for readability
  var wLabels = [], wOrganic = [], wPaid = [], wSocial = [], wDirect = [];
  for (var i = 0; i < 30; i += 5) {
    wLabels.push(labels[i]);
    var slice = function(arr) { return arr.slice(i, i+5).reduce(function(a,b){return a+b;},0); };
    wOrganic.push(slice(chanData.organic));
    wPaid.push(slice(chanData.paid));
    wSocial.push(slice(chanData.social));
    wDirect.push(slice(chanData.direct));
  }

  _charts.channelOrders = new Chart(document.getElementById('chartChannelOrders'), {
    type: 'bar',
    data: {
      labels: wLabels,
      datasets: [
        { label: tt('chanOrganic'), data: wOrganic, backgroundColor: '#14b8a6', borderRadius: 3 },
        { label: tt('chanPaid'), data: wPaid, backgroundColor: '#0d9488', borderRadius: 3 },
        { label: tt('chanSocial'), data: wSocial, backgroundColor: '#5eead4', borderRadius: 3 },
        { label: tt('chanDirect'), data: wDirect, backgroundColor: '#99f6e4', borderRadius: 3 }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12 } } },
      scales: {
        x: { stacked: true, ticks: { font: { size: 10 } }, grid: { display: false } },
        y: { stacked: true, ticks: { font: { size: 10 } } }
      }
    }
  });

  var cOrganic = rndF(3.1, 4.2, 1);
  var cPaid = rndF(2.0, 3.2, 1);
  var cSocial = rndF(1.4, 2.6, 1);
  var cDirect = rndF(3.8, 5.2, 1);
  var cEmail = rndF(4.5, 6.1, 1);

  _charts.channelConv = new Chart(document.getElementById('chartChannelConv'), {
    type: 'bar',
    data: {
      labels: [tt('chanOrganic'), tt('chanPaid'), tt('chanSocial'), tt('chanDirect'), tt('chanEmail')],
      datasets: [{
        label: tt('conversion') + ' %',
        data: [cOrganic, cPaid, cSocial, cDirect, cEmail],
        backgroundColor: ['#0d9488','#14b8a6','#5eead4','#0f766e','#134e4a'],
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          ticks: { font: { size: 10 }, callback: function(v) { return v + '%'; } },
          grid: { display: false }
        },
        y: { ticks: { font: { size: 10 } } }
      }
    }
  });
}

function pageReturns() {
  var returnData = gen30DayReturns();
  var totalReturns = returnData.reduce(function(a, b) { return a + b; }, 0);
  var totalOrders = gen30DayOrders().reduce(function(a, b) { return a + b; }, 0);
  var returnRatePct = ((totalReturns / totalOrders) * 100).toFixed(1);
  var revLost = Math.round(totalReturns * rndF(45, 85, 0));
  var avgDays = rndF(3.2, 6.8, 1);

  return '<div class="p-5 fade-in">' +
    '<h1 class="text-lg font-bold text-gray-800 mb-4">' + tt('navReturns') + '</h1>' +
    '<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">' +
      kpiCard(tt('kpiTotalReturns'), totalReturns.toLocaleString(), tt('days30'), 'text-gray-400') +
      kpiCard(tt('kpiReturnRatePct'), returnRatePct + '%', '+' + rndF(0.2, 1.5, 1) + 'pp ' + tt('vs'), 'text-amber-600') +
      kpiCard(tt('kpiReturnRevLost'), '$' + revLost.toLocaleString(), tt('days30'), 'text-red-500') +
      kpiCard(tt('kpiAvgDaysReturn'), avgDays + ' days', tt('days30'), 'text-gray-400') +
    '</div>' +
    '<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">' +
      '<div class="lg:col-span-2 bg-white rounded-xl p-4 shadow-sm">' +
        sectionHeader(tt('chartReturnsTrend')) +
        '<canvas id="chartReturnsTrend" height="120"></canvas>' +
      '</div>' +
      '<div class="bg-white rounded-xl p-4 shadow-sm">' +
        sectionHeader(tt('chartReturnReasons')) +
        '<canvas id="chartReturnReasons" height="200"></canvas>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ===== NAVIGATION =====
var pageRenderers = {
  overview: { html: pageOverview, charts: renderChartsOverview },
  products: { html: pageProducts, charts: renderChartsProducts },
  channels: { html: pageChannels, charts: renderChartsChannels },
  returns:  { html: pageReturns,  charts: renderChartsReturns  }
};

function navigateTo(page) {
  if (!pageRenderers[page]) page = 'overview';
  currentPage = page;
  destroyCharts();

  var mc = document.getElementById('mainContent');
  mc.innerHTML = pageRenderers[page].html();

  document.querySelectorAll('.nav-link').forEach(function(el) {
    el.classList.toggle('active', el.dataset.page === page);
  });

  setTimeout(function() { pageRenderers[page].charts(); }, 40);
}

function buildNav() {
  var navDef = [
    { page: 'overview', icon: '&#128200;', key: 'navOverview' },
    { page: 'products', icon: '&#128230;', key: 'navProducts' },
    { page: 'channels', icon: '&#128268;', key: 'navChannels' },
    { page: 'returns',  icon: '&#128257;', key: 'navReturns'  }
  ];

  var nav = document.getElementById('nav');
  nav.innerHTML = navDef.map(function(n) {
    return '<button onclick="navigateTo(\'' + n.page + '\')" data-page="' + n.page + '" class="nav-link">' +
      '<span style="font-size:14px">' + n.icon + '</span>' +
      '<span>' + tt(n.key) + '</span>' +
    '</button>';
  }).join('');
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('sidebarTitle').textContent = tt('sidebarTitle');
  document.getElementById('sidebarSubtitle').textContent = tt('sidebarSubtitle');
  document.getElementById('promptText').textContent = tt('promptText');
  document.getElementById('ctaBtn').textContent = tt('ctaLabel');

  buildNav();
  navigateTo('overview');

  if (_isRuBrowser) {
    document.getElementById('langToggle').style.display = '';
    document.getElementById('langBtn').textContent = tt('langLabel');
  }
});
