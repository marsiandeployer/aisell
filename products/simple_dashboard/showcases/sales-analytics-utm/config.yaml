spa_implementation:
  navigation_function: |
    function navigateTo(page) {
      currentPage = page;
      const content = document.getElementById('mainContent');
      content.innerHTML = pages[page]();

      // Update active nav
      document.querySelectorAll('.nav-link').forEach(link => {
        if (link.dataset.page === page) {
          link.classList.add('bg-blue-600');
          link.classList.remove('hover:bg-gray-700');
        } else {
          link.classList.remove('bg-blue-600');
          link.classList.add('hover:bg-gray-700');
        }
      });

      // Render charts after DOM update
      setTimeout(() => renderCharts(page), 50);
    }

  page_structure: |
    const pages = {
      overview: () => `<!-- HTML for overview page -->`,
      sales: () => `<!-- HTML for sales page -->`,
      utm: () => `<!-- HTML for UTM page -->`,
      conversions: () => `<!-- HTML for conversions page -->`
    };

  initial_load: |
    window.addEventListener('DOMContentLoaded', () => {
      navigateTo('overview');
    });
