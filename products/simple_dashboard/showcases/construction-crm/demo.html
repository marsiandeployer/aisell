      calendar: function() {
        var tasks = genAutoTasks();
        var today = '2026-02-20';
        var weekEnd = '2026-02-27';
        var nextWeekEnd = '2026-03-06';
        var overdueTasks = tasks.filter(function(t) { return t.deadline < today; });
        var thisWeekTasks = tasks.filter(function(t) { return t.deadline >= today && t.deadline <= weekEnd; });
        var nextWeekTasks = tasks.filter(function(t) { return t.deadline > weekEnd && t.deadline <= nextWeekEnd; });
        var laterTasks = tasks.filter(function(t) { return t.deadline > nextWeekEnd; });

        function renderGroup(label, items, accent) {
          if (!items.length) return '<div class="mb-3"><h3 class="font-semibold text-xs mb-1 ' + accent + '">' + label + '</h3><div class="text-xs text-gray-400 pl-2">' + tt('noDue') + '</div></div>';
          return '<div class="mb-3"><h3 class="font-semibold text-xs mb-1.5 ' + accent + '">' + label + ' <span class="text-gray-400 font-normal">(' + items.length + ')</span></h3>' +
            '<div class="space-y-1">' + items.map(function(t) {
              return '<div class="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm border border-gray-100 text-xs">' +
                '<div class="w-20 text-gray-500">' + t.deadline + '</div>' +
                '<div class="flex-1 font-medium">' + tt(t.name) + '</div>' +
                '<div class="text-gray-500">' + t.client + '</div>' +
                '<div class="w-24">' + statusBadge(t.stage) + '</div>' +
                '<div class="w-20 text-right">' + tt(t.assignee) + '</div></div>';
            }).join('') + '</div></div>';
        }

        return '<h1 class="text-xl font-bold mb-4">' + tt('calendarTitle') + '</h1>' +
          '<div class="grid grid-cols-4 gap-3 mb-4">' +
            '<div class="bg-white p-3 rounded-xl shadow-sm border border-red-200 text-center"><div class="text-xs text-red-500">' + tt('taskOverdue') + '</div><div class="text-2xl font-bold text-red-600">' + overdueTasks.length + '</div></div>' +
            '<div class="bg-white p-3 rounded-xl shadow-sm border border-yellow-200 text-center"><div class="text-xs text-yellow-600">' + tt('thisWeek') + '</div><div class="text-2xl font-bold text-yellow-600">' + thisWeekTasks.length + '</div></div>' +
            '<div class="bg-white p-3 rounded-xl shadow-sm border border-blue-200 text-center"><div class="text-xs text-blue-500">' + tt('nextWeek') + '</div><div class="text-2xl font-bold text-blue-600">' + nextWeekTasks.length + '</div></div>' +
            '<div class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 text-center"><div class="text-xs text-gray-500">' + tt('later') + '</div><div class="text-2xl font-bold text-gray-600">' + laterTasks.length + '</div></div>' +
          '</div>' +
          renderGroup(tt('taskOverdue'), overdueTasks, 'text-red-600') +
          renderGroup(tt('thisWeek'), thisWeekTasks, 'text-yellow-600') +
          renderGroup(tt('nextWeek'), nextWeekTasks, 'text-blue-600') +
          renderGroup(tt('later'), laterTasks, 'text-gray-600');
      }
    };

    function navigateTo(page) {
      currentPage = page;
      document.getElementById('mainContent').innerHTML = pages[page]();
      updateNavLabels();
      document.querySelectorAll('.nav-link').forEach(function(link) {
        if (link.dataset.page === page) {
          link.classList.add('bg-blue-600');
          link.classList.remove('hover:bg-gray-700');
        } else {
          link.classList.remove('bg-blue-600');
          link.classList.add('hover:bg-gray-700');
        }
      });
      setTimeout(function() { renderCharts(page); }, 50);

        new Chart(document.getElementById('typeChart'), {
          type: 'doughnut',
          data: { labels: typeKeys.map(function(k) { return tt(k); }), datasets: [{ data: typeKeys.map(function(k) { return types[k]; }), backgroundColor: typeColors }] },
          options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } }, animation: { duration: 400 } }
        });
        var months = tt('monthLabels').slice(0, 6);
        var rev = genMonthly(800, 2500, 6).map(function(v) { return v * 1000; });
        new Chart(document.getElementById('trendChart'), {
          type: 'line',
          data: { labels: months, datasets: [{ data: rev, borderColor: '#10B981', backgroundColor: 'rgba(16,185,129,0.1)', tension: 0.3, fill: true, pointRadius: 3 }] },
          options: defOpts
        });
      }

      if (page === 'pipeline') {
        var p2 = genPipeline();
        var vals = statusKeys.map(function(k) { return p2[k]; });
        var convRates = vals.slice(1).map(function(v, i) { return vals[i] > 0 ? Math.round(v / vals[i] * 100) : 0; });
        new Chart(document.getElementById('conversionChart'), {
          type: 'bar',
          data: { labels: statusKeys.slice(0, -1).map(function(k) { return tt(k) + ' \u2192'; }), datasets: [{ data: convRates, backgroundColor: statusKeys.slice(1).map(function(k) { return statusColors[k]; }), barThickness: 20 }] },
          options: Object.assign({}, defOpts, { scales: { y: { beginAtZero: true, max: 100, ticks: { callback: function(v) { return v + '%'; } } }, x: { ticks: { font: { size: 8 }, maxRotation: 45 } } } })
        });
        new Chart(document.getElementById('pipelineFlowChart'), {
          type: 'bar',
          data: { labels: statusKeys.map(function(k) { return tt(k); }), datasets: [{ data: vals, backgroundColor: statusKeys.map(function(k) { return statusColors[k]; }) }] },
          options: Object.assign({}, defOpts, { indexAxis: 'y', scales: { x: { beginAtZero: true }, y: { ticks: { font: { size: 9 } } } } })
        });
      }

      if (page === 'team') {
        var depts = genTeamData();
        var deptLabels = depts.map(function(d) { return tt(d.dept); });
        var deptTasks = depts.map(function(d) { return d.roles.reduce(function(s,r) { return s + r.tasks; }, 0); });
        var deptOverdue = depts.map(function(d) { return d.roles.reduce(function(s,r) { return s + r.overdue; }, 0); });
        var deptColors = ['#3B82F6','#F97316','#10B981','#06B6D4','#8B5CF6','#EC4899','#F59E0B'];
        new Chart(document.getElementById('tasksDeptChart'), {
          type: 'bar',
          data: { labels: deptLabels, datasets: [{ data: deptTasks, backgroundColor: deptColors }] },
          options: Object.assign({}, defOpts, { scales: { x: { ticks: { font: { size: 9 } } } } })
        });
        new Chart(document.getElementById('overdueDeptChart'), {
          type: 'bar',
          data: { labels: deptLabels, datasets: [{ data: deptOverdue, backgroundColor: '#EF4444' }] },
          options: Object.assign({}, defOpts, { scales: { x: { ticks: { font: { size: 9 } } } } })
        });
      }

      if (page === 'tasks') {
        var tasks = genAutoTasks();
        var stageCounts = {};
        statusKeys.forEach(function(k) { stageCounts[k] = 0; });
        tasks.forEach(function(t) { if (stageCounts[t.stage] !== undefined) stageCounts[t.stage]++; });
        new Chart(document.getElementById('tasksStageChart'), {
          type: 'bar',
          data: { labels: statusKeys.map(function(k) { return tt(k); }), datasets: [{ data: statusKeys.map(function(k) { return stageCounts[k]; }), backgroundColor: statusKeys.map(function(k) { return statusColors[k]; }) }] },
          options: Object.assign({}, defOpts, { scales: { x: { ticks: { font: { size: 8 }, maxRotation: 45 } } } })
        });
        var pending = tasks.filter(function(t) { return t.status === 'taskPending'; }).length;
        var done = tasks.filter(function(t) { return t.status === 'taskDone'; }).length;
        var overdue = tasks.filter(function(t) { return t.status === 'taskOverdue'; }).length;
        new Chart(document.getElementById('tasksStatusChart'), {
          type: 'doughnut',
          data: { labels: [tt('taskPending'), tt('taskDone'), tt('taskOverdue')], datasets: [{ data: [pending, done, overdue], backgroundColor: ['#F59E0B','#10B981','#EF4444'] }] },
          options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } }, animation: { duration: 400 } }
        });
      }

      if (page === 'analytics') {
        var months = tt('monthLabels');
        var rev = genMonthly(800, 2500, 12).map(function(v) { return v * 1000; });
        var closed = genMonthly(3, 14, 12);
        var p3 = genPipeline();
        var revByType = genRevenueByType();
        var onTimePct = rand(65, 90);
        new Chart(document.getElementById('revenueChart'), {
          type: 'line',
          data: { labels: months, datasets: [{ label: tt('totalRevenue'), data: rev, borderColor: '#10B981', backgroundColor: 'rgba(16,185,129,0.1)', tension: 0.3, fill: true, pointRadius: 2 }] },
          options: defOpts
        });
        new Chart(document.getElementById('dealsMonthChart'), {
          type: 'bar',
          data: { labels: months, datasets: [{ label: tt('deals'), data: closed, backgroundColor: '#3B82F6' }] },
          options: defOpts
        });
        new Chart(document.getElementById('funnelAnalChart'), {
          type: 'bar',
          data: { labels: statusKeys.map(function(k) { return tt(k); }), datasets: [{ data: statusKeys.map(function(k) { return p3[k]; }), backgroundColor: statusKeys.map(function(k) { return statusColors[k]; }) }] },
          options: Object.assign({}, defOpts, { indexAxis: 'y', scales: { y: { ticks: { font: { size: 9 } } } } })
        });
        new Chart(document.getElementById('revTypeChart'), {
          type: 'doughnut',
          data: { labels: typeKeys.map(function(k) { return tt(k); }), datasets: [{ data: typeKeys.map(function(k) { return revByType[k]; }), backgroundColor: typeColors }] },
          options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } }, animation: { duration: 400 } }
        });
        new Chart(document.getElementById('deadlineChart'), {
          type: 'doughnut',
          data: { labels: [tt('onTime'), tt('delayed')], datasets: [{ data: [onTimePct, 100 - onTimePct], backgroundColor: ['#10B981','#EF4444'] }] },
          options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } }, animation: { duration: 400 } }
        });
      }
    }

    // ===== Prompt bar =====
    var _promptTitle = {
      ru: '\u00ab\u0421\u0434\u0435\u043b\u0430\u0439 CRM-\u0434\u0430\u0448\u0431\u043e\u0440\u0434 \u0434\u043b\u044f \u0441\u0442\u0440\u043e\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0439 \u043a\u043e\u043c\u043f\u0430\u043d\u0438\u0438 \u0441 8 \u0441\u0442\u0430\u0442\u0443\u0441\u0430\u043c\u0438, 15 \u0440\u043e\u043b\u044f\u043c\u0438 \u0438 \u0430\u0432\u0442\u043e\u0437\u0430\u0434\u0430\u0447\u0430\u043c\u0438\u00bb',
      en: '\u201CBuild a Construction CRM with 8 pipeline stages, 15 roles, auto-tasks and deadline tracking\u201D'
    };
    var _fullPrompt = '\u0421\u0434\u0435\u043b\u0430\u0439 CRM-\u0434\u0430\u0448\u0431\u043e\u0440\u0434 \u0434\u043b\u044f \u0441\u0442\u0440\u043e\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0439 \u043a\u043e\u043c\u043f\u0430\u043d\u0438\u0438: 8 \u0441\u0442\u0430\u0442\u0443\u0441\u043e\u0432 (\u043d\u043e\u0432\u044b\u0439 \u043b\u0438\u0434, \u0440\u0430\u0441\u0447\u0451\u0442, \u043a\u043e\u043d\u0442\u0440\u0430\u043a\u0442, \u043f\u0440\u043e\u0435\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435, \u0441\u0442\u0440\u043e\u0439\u043a\u0430, \u043f\u043e\u0441\u0442\u0430\u0432\u043a\u0430, \u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0441, \u043e\u0431\u0440\u0430\u0442\u043d\u0430\u044f \u0441\u0432\u044f\u0437\u044c), 15 \u0440\u043e\u043b\u0435\u0439 \u043f\u043e \u043e\u0442\u0434\u0435\u043b\u0430\u043c, \u0430\u0432\u0442\u043e\u0437\u0430\u0434\u0430\u0447\u0438 \u0441 \u0434\u0435\u0434\u043b\u0430\u0439\u043d\u0430\u043c\u0438, \u043a\u0430\u043b\u0435\u043d\u0434\u0430\u0440\u044c \u0441\u0440\u043e\u043a\u043e\u0432, \u0430\u043d\u0430\u043b\u0438\u0442\u0438\u043a\u0430 \u043a\u043e\u043d\u0432\u0435\u0440\u0441\u0438\u0439 \u0438 \u0432\u044b\u0440\u0443\u0447\u043a\u0438';
    var _ctaLabel = { ru: '\u0425\u043e\u0447\u0443 \u0442\u0430\u043a\u043e\u0439 \u0436\u0435', en: 'I want the same' };

    function updatePromptBar() {
      document.getElementById('promptText').textContent = _promptTitle[_lang] || _promptTitle['en'];
      var btn = document.getElementById('ctaBtn');
      btn.textContent = _ctaLabel[_lang] || _ctaLabel['en'];
      btn.href = '/?start=example_construction-crm&prompt=' + encodeURIComponent(_fullPrompt);
      btn.onclick = function(e) {
        var insideIframe = false;
        try { insideIframe = window.parent && window.parent !== window; } catch (_e) {}
        if (insideIframe) {
          e.preventDefault();
          try {
            window.parent.postMessage({ type: 'open_webchat_prompt', prompt: _fullPrompt }, '*');
          } catch (_e) {}
          return;
        }
        var extId = '';
        try { extId = String(new URLSearchParams(window.location.search).get('ext_id') || '').trim(); } catch (_e) {}
        if (!extId) return;
        try {
          if (window.chrome && chrome.runtime && typeof chrome.runtime.sendMessage === 'function') {
            e.preventDefault();
            chrome.runtime.sendMessage(extId, { type: 'open_webchat_prompt', prompt: _fullPrompt });
          }
        } catch (_e) {}
      };
    }

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', function() {
      updateNavLabels();
      updatePromptBar();
      if (_isRuBrowser) {
        var lt = document.getElementById('langToggle');
        if (lt) lt.style.display = '';
        document.getElementById('langBtn').textContent = _lang === 'ru' ? '\uD83C\uDF10 \u0420\u0443\u0441\u0441\u043a\u0438\u0439' : '\uD83C\uDF10 English';
      }
      var initialPage = location.hash.slice(1) || 'overview';
      navigateTo(initialPage);

      var _lastScroll = 0;
      var _bar = document.getElementById('promptBar');
      var _main = document.querySelector('main');
      if (_main && _bar) {
        _main.addEventListener('scroll', function() {
          var st = _main.scrollTop;
          _bar.style.transform = st > _lastScroll && st > 40 ? 'translateY(100%)' : 'translateY(0)';
          _lastScroll = st;
        });
      }
    });
  </script>
</body>
</html>
