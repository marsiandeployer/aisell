function destroyCharts() {
  Object.values(_charts).forEach(function(c) { try { c.destroy(); } catch(_e) {} });

function navigateTo(page) {
  currentPage = page;
  destroyCharts();
  var content = document.getElementById('mainContent');
  var html = '';
  if (page === 'overview') html = renderOverview();
  else if (page === 'clients') html = renderClients();
  else if (page === 'team') html = renderTeam();
  else if (page === 'finance') html = renderFinance();
  content.innerHTML = '<div class="p-6 fade-in">' + html + '</div>';

  document.querySelectorAll('.nav-link').forEach(function(l) {
    l.classList.toggle('active', l.dataset.page === page);
  });

  // Update i18n nav labels
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.textContent = tt(el.getAttribute('data-i18n'));
  });

  setTimeout(function() { renderCharts(page); }, 50);
}

function renderOverview() {
  var activeClients = clients.filter(function(c) { return c.status === 'active'; }).length;
  var runningProjects = clients.filter(function(c) { return c.status === 'active' || c.status === 'review'; }).length;
  var avgUtil = Math.round(team.reduce(function(s, m) { return s + m.utilization; }, 0) / team.length);
  var monthRev = monthlyRevenue[11];
  var prevRev = monthlyRevenue[10];
  var revDelta = Math.round((monthRev - prevRev) / prevRev * 100);

  var kpis = [
    { label: tt('activeClients'), value: activeClients, delta: '+2', positive: true, icon: '&#128101;' },
    { label: tt('runningProjects'), value: runningProjects, delta: '+1', positive: true, icon: '&#128196;' },
    { label: tt('teamUtilization'), value: avgUtil + '%', delta: '+3%', positive: true, icon: '&#9881;' },
    { label: tt('monthlyRevenue'), value: fmtUSD(monthRev), delta: (revDelta > 0 ? '+' : '') + revDelta + '% ' + tt('vsLastMonth'), positive: revDelta >= 0, icon: '&#128184;' },
  ];

  var statusCounts = { active: 0, planning: 0, review: 0, paused: 0 };
  clients.forEach(function(c) { statusCounts[c.status] = (statusCounts[c.status] || 0) + 1; });

  return '<h2 class="text-xl font-bold text-gray-800 mb-5">' + tt('overviewTitle') + '</h2>'
    + renderKPIRow(kpis)
    + '<div class="grid grid-cols-2 gap-4 mt-4">'
    + '<div class="bg-white rounded-xl p-4 card">'
    + '<div class="font-semibold text-gray-700 mb-3 text-sm">' + tt('revenueByClient') + '</div>'
    + '<canvas id="chartRevClient" height="220"></canvas></div>'
    + '<div class="bg-white rounded-xl p-4 card">'
    + '<div class="font-semibold text-gray-700 mb-3 text-sm">' + tt('projectStatus') + '</div>'
    + '<canvas id="chartProjStatus" height="220"></canvas></div>'
    + '</div>';
}

// ===== Clients =====
function renderClients() {
  var rows = clients.map(function(c) {
    return '<tr>'
      + '<td class="font-medium text-gray-800">' + c.name + '</td>'
      + '<td class="text-gray-600">' + c.project + '</td>'
      + '<td class="text-gray-800">' + fmtUSD(c.budget) + '</td>'
      + '<td>' + getStatusBadge(c.status) + '</td>'
      + '<td class="text-gray-500">' + c.manager + '</td>'
      + '</tr>';
  }).join('');

  var kpis = [
    { label: tt('clientsWon'), value: '14', delta: '+3', positive: true, icon: '&#9989;' },
    { label: tt('clientsLost'), value: '2', delta: '-1', positive: true, icon: '&#10060;' },
    { label: tt('avgContract'), value: fmtUSD(21800), delta: '+8%', positive: true, icon: '&#128179;' },
    { label: tt('retentionRate'), value: '87%', delta: '+4%', positive: true, icon: '&#128200;' },
  ];

  return '<h2 class="text-xl font-bold text-gray-800 mb-5">' + tt('clientsTitle') + '</h2>'
    + renderKPIRow(kpis)
    + '<div class="grid grid-cols-2 gap-4 mt-4">'
    + '<div class="bg-white rounded-xl p-4 card col-span-1">'
    + '<div class="font-semibold text-gray-700 mb-3 text-sm">' + tt('clientList') + '</div>'
    + '<div style="overflow-x:auto"><table>'
    + '<thead><tr>'
    + '<th>' + tt('client') + '</th><th>' + tt('project') + '</th><th>' + tt('budget') + '</th><th>' + tt('status') + '</th><th>' + tt('manager') + '</th>'
    + '</tr></thead><tbody>' + rows + '</tbody></table></div></div>'
    + '<div class="bg-white rounded-xl p-4 card col-span-1">'
    + '<div class="font-semibold text-gray-700 mb-3 text-sm">' + tt('revenueByClientH') + '</div>'
    + '<canvas id="chartClientRevH" height="340"></canvas></div>'
    + '</div>';
}

// ===== Team =====
function renderTeam() {
  var totalBillable = team.reduce(function(s, m) { return s + m.billable; }, 0);
  var totalOT = team.reduce(function(s, m) { return s + m.ot; }, 0);
  var avgUtil = Math.round(team.reduce(function(s, m) { return s + m.utilization; }, 0) / team.length);

  var kpis = [
    { label: tt('totalStaff'), value: team.length, delta: '+2', positive: true, icon: '&#128101;' },
    { label: tt('utilizationPct'), value: avgUtil + '%', delta: '+3%', positive: true, icon: '&#9881;' },
    { label: tt('billableHours'), value: totalBillable.toLocaleString('en-US'), delta: '+5%', positive: true, icon: '&#9200;' },
    { label: tt('overtime'), value: totalOT, delta: '-8%', positive: true, icon: '&#128337;' },
  ];

  return '<h2 class="text-xl font-bold text-gray-800 mb-5">' + tt('teamTitle') + '</h2>'
    + renderKPIRow(kpis)
    + '<div class="grid grid-cols-2 gap-4 mt-4">'
    + '<div class="bg-white rounded-xl p-4 card">'
    + '<div class="font-semibold text-gray-700 mb-3 text-sm">' + tt('teamUtilizationChart') + '</div>'
    + '<canvas id="chartTeamUtil" height="280"></canvas></div>'
    + '<div class="bg-white rounded-xl p-4 card">'
    + '<div class="font-semibold text-gray-700 mb-3 text-sm">' + tt('workloadChart') + '</div>'
    + '<canvas id="chartWorkload" height="280"></canvas></div>'
    + '</div>';
}

// ===== Finance =====
function renderFinance() {
  var revNow = monthlyRevenue[11];
  var expNow = monthlyExpenses[11];
  var profitNow = revNow - expNow;
  var margin = Math.round(profitNow / revNow * 100);
  var avgProfit = Math.round(clients.reduce(function(s, c) { return s + (c.revenue - c.budget * 0.65); }, 0) / clients.length);

  var kpis = [
    { label: tt('grossRevenue'), value: fmtUSD(revNow), delta: '+8%', positive: true, icon: '&#128184;' },
    { label: tt('expenses'), value: fmtUSD(expNow), delta: '+6%', positive: false, icon: '&#128197;' },
    { label: tt('profitMargin'), value: margin + '%', delta: '+2%', positive: true, icon: '&#128200;' },
    { label: tt('avgProjectProfit'), value: fmtUSD(avgProfit), delta: '+11%', positive: true, icon: '&#129297;' },
  ];

  return '<h2 class="text-xl font-bold text-gray-800 mb-5">' + tt('financeTitle') + '</h2>'
    + renderKPIRow(kpis)
    + '<div class="grid grid-cols-3 gap-4 mt-4">'
    + '<div class="bg-white rounded-xl p-4 card col-span-2">'
    + '<div class="font-semibold text-gray-700 mb-3 text-sm">' + tt('plChart') + '</div>'
    + '<canvas id="chartPL" height="220"></canvas></div>'
    + '<div class="bg-white rounded-xl p-4 card col-span-1">'
    + '<div class="font-semibold text-gray-700 mb-3 text-sm">' + tt('revenueBreakdown') + '</div>'
    + '<canvas id="chartRevBreak" height="220"></canvas></div>'
    + '</div>';
}

// ===== KPI Card helper =====
function renderKPIRow(kpis) {
  return '<div class="grid grid-cols-4 gap-4">'
    + kpis.map(function(k) {
      return '<div class="kpi-card bg-white rounded-xl p-4 flex flex-col gap-1">'
        + '<div class="flex items-center gap-2 text-gray-500 text-xs font-medium">'
        + '<span style="font-size:18px">' + k.icon + '</span>' + k.label + '</div>'
        + '<div class="text-2xl font-bold text-gray-900">' + k.value + '</div>'
        + '<div class="text-xs ' + (k.positive ? 'text-green-600' : 'text-red-500') + ' font-medium">'
        + (k.positive ? '&#9650; ' : '&#9660; ') + k.delta + '</div>'
        + '</div>';
    }).join('') + '</div>';
}

// ===== Charts =====
function renderCharts(page) {
  var months = tt('months');
  if (page === 'overview') {
    // Revenue by client bar
    var sortedClients = clients.slice().sort(function(a, b) { return b.revenue - a.revenue; }).slice(0, 8);
    _charts.revClient = new Chart(document.getElementById('chartRevClient'), {
      type: 'bar',
      data: {
        labels: sortedClients.map(function(c) { return c.name; }),
        datasets: [{
          label: tt('revenue'),
          data: sortedClients.map(function(c) { return c.revenue; }),
          backgroundColor: 'rgba(99,102,241,0.75)',
          borderRadius: 5,
        }]
      },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: function(v) { return '$' + (v/1000) + 'k'; } } } } }
    });
    // Project status pie
    var sc = { active: 0, planning: 0, review: 0, paused: 0 };
    clients.forEach(function(c) { sc[c.status] = (sc[c.status]||0)+1; });
    _charts.projStatus = new Chart(document.getElementById('chartProjStatus'), {
      type: 'pie',
      data: {
        labels: [tt('active'), tt('planning'), tt('review'), tt('paused')],
        datasets: [{
          data: [sc.active, sc.planning, sc.review, sc.paused],
          backgroundColor: ['#22c55e','#eab308','#6366f1','#ef4444'],
        }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
  } else if (page === 'clients') {
    var sortedByRev = clients.slice().sort(function(a, b) { return b.revenue - a.revenue; });
    _charts.clientRevH = new Chart(document.getElementById('chartClientRevH'), {
      type: 'bar',
      data: {
        labels: sortedByRev.map(function(c) { return c.name; }),
        datasets: [{
          label: tt('revenue'),
          data: sortedByRev.map(function(c) { return c.revenue; }),
          backgroundColor: 'rgba(99,102,241,0.7)',
          borderRadius: 4,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, ticks: { callback: function(v) { return '$' + (v/1000) + 'k'; } } } }
      }
    });
  } else if (page === 'team') {
    // Team utilization bar
    _charts.teamUtil = new Chart(document.getElementById('chartTeamUtil'), {
      type: 'bar',
      data: {
        labels: team.map(function(m) { return m.name; }),
        datasets: [{
          label: tt('utilizationPct'),
          data: team.map(function(m) { return m.utilization; }),
          backgroundColor: team.map(function(m) {
            if (m.utilization >= 90) return 'rgba(239,68,68,0.75)';
            if (m.utilization >= 75) return 'rgba(99,102,241,0.75)';
            return 'rgba(34,197,94,0.7)';
          }),
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100, ticks: { callback: function(v) { return v + '%'; } } },
          x: { ticks: { maxRotation: 45, font: { size: 10 } } }
        }
      }
    });
    // Workload stacked bar (by role group)
    var roleGroups = {};
    team.forEach(function(m) {
      var r = m.role.replace(/Junior\s/, '').replace(/Lead/, 'Mgr').split(' ').slice(0,2).join(' ');
      if (!roleGroups[r]) roleGroups[r] = { billable: 0, internal: 0, ot: 0, count: 0 };
      roleGroups[r].billable += m.billable;
      roleGroups[r].internal += m.internal;
      roleGroups[r].ot += m.ot;
      roleGroups[r].count++;
    });
    var rLabels = Object.keys(roleGroups);
    _charts.workload = new Chart(document.getElementById('chartWorkload'), {
      type: 'bar',
      data: {
        labels: rLabels,
        datasets: [
          { label: tt('billable'), data: rLabels.map(function(k) { return Math.round(roleGroups[k].billable/roleGroups[k].count); }), backgroundColor: 'rgba(99,102,241,0.8)', borderRadius: 4 },
          { label: tt('internal'), data: rLabels.map(function(k) { return Math.round(roleGroups[k].internal/roleGroups[k].count); }), backgroundColor: 'rgba(167,139,250,0.7)', borderRadius: 4 },
          { label: tt('ot'), data: rLabels.map(function(k) { return Math.round(roleGroups[k].ot/roleGroups[k].count); }), backgroundColor: 'rgba(239,68,68,0.65)', borderRadius: 4 },
        ]
      },
      options: {
        responsive: true,
        scales: {
          x: { stacked: true, ticks: { maxRotation: 40, font: { size: 10 } } },
          y: { stacked: true }
        },
        plugins: { legend: { position: 'bottom' } }
      }
    });
  } else if (page === 'finance') {
    // P&L line chart
    var profitData = monthlyRevenue.map(function(r, i) { return r - monthlyExpenses[i]; });
    _charts.pl = new Chart(document.getElementById('chartPL'), {
      type: 'line',
      data: {
        labels: months,
        datasets: [
          { label: tt('revenue'), data: monthlyRevenue, borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.12)', fill: true, tension: 0.35, pointRadius: 4 },
          { label: tt('expense'), data: monthlyExpenses, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)', fill: true, tension: 0.35, pointRadius: 4 },
          { label: tt('profit'), data: profitData, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.08)', fill: false, tension: 0.35, borderDash: [4,3], pointRadius: 3 },
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom' } },
        scales: { y: { ticks: { callback: function(v) { return '$' + (v/1000) + 'k'; } } } }
      }
    });
    // Revenue breakdown doughnut
    var top6 = clients.slice().sort(function(a,b) { return b.revenue-a.revenue; }).slice(0,6);
    var otherRev = clients.slice(6).reduce(function(s,c) { return s+c.revenue; }, 0);
    _charts.revBreak = new Chart(document.getElementById('chartRevBreak'), {
      type: 'doughnut',
      data: {
        labels: top6.map(function(c) { return c.name; }).concat(['Others']),
        datasets: [{
          data: top6.map(function(c) { return c.revenue; }).concat([otherRev]),
          backgroundColor: ['#6366f1','#8b5cf6','#a78bfa','#c4b5fd','#4f46e5','#7c3aed','#d1d5db'],
          borderWidth: 2,
        }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
    });
  }
}

// ===== Init =====
window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('sidebarTitle').textContent = tt('sidebarTitle');
  document.getElementById('sidebarSubtitle').textContent = tt('sidebarSubtitle');
  document.getElementById('promptText').textContent = tt('promptText');
  document.getElementById('ctaBtn').textContent = tt('ctaBtn');

  if (_isRuBrowser) {
    document.getElementById('langToggle').style.display = '';
    document.getElementById('langBtn').textContent = _lang === 'ru' ? '\u0420\u0443\u0441\u0441\u043a\u0438\u0439' : 'English';
  }

  navigateTo('overview');
});
</script>
</body>
</html>
