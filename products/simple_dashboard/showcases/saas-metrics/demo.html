// ===== JIT Data =====
function genMrrSeries() {
  // MRR: $8k → $28k over 12 months, realistic tapering growth
  var base = 8000;
  var rates = [0.18, 0.17, 0.16, 0.15, 0.14, 0.13, 0.12, 0.11, 0.10, 0.09, 0.08, 0.07];
  var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  var vals = [base];
  for (var i = 1; i < 12; i++) {
    var noise = (Math.random() - 0.5) * 0.04;
    vals.push(Math.round(vals[i-1] * (1 + rates[i] + noise)));
  }
  return { labels: months, values: vals };
}
function genCustomerSeries(mrrVals) {
  // Customers: 45 → 180 over 12 months, proportional to MRR
  var start = 45; var end = 180;
  return mrrVals.map(function(m, i) {
    var frac = i / 11;
    var noise = Math.round((Math.random() - 0.5) * 4);
    return Math.round(start + (end - start) * (frac * frac * 0.5 + frac * 0.5) + noise);
  });
}
function genDauSeries() {
  // DAU: 30-day series, base ~420, weekly patterns
  var base = 420;
  return Array.from({length: 30}, function(_, i) {
    var dow = i % 7;
    var weekMult = (dow === 0 || dow === 6) ? 0.72 : 1.0;
    var trend = 1 + i * 0.003;
    var noise = (Math.random() - 0.5) * 0.15;
    return Math.round(base * weekMult * trend * (1 + noise));
  });
}

    return pageHeader(tt('overviewTitle'), tt('overviewDesc'))
      + '<div style="padding:0 28px 20px">'
      + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">'
      + kpiCard(tt('mrr'), fmt(CURR_MRR), trendUp(mrrDelta), 'Monthly Recurring Revenue')
      + kpiCard(tt('arr'), fmt(CURR_ARR), trendUp((mrrDelta * 1.05).toFixed(1)), 'Annual Run Rate')
      + kpiCard(tt('activeCustomers'), CURR_CUSTOMERS, trendUp('12.4'), 'Paying subscribers')
      + kpiCard(tt('churnRate'), fmtPct(CHURN_RATE), trendDown('0.3'), '< 5% is healthy')
      + '</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
      + chartCard('chartMrrTrend', tt('mrrTrend'), 220)
      + chartCard('chartCustomerGrowth', tt('customerGrowth'), 220)
      + '</div>'
      + '</div>';
  },

  growth: function() {
    var mrrDelta = +(((CURR_MRR - PREV_MRR) / PREV_MRR) * 100).toFixed(1);
    return pageHeader(tt('growthTitle'), tt('growthDesc'))
      + '<div style="padding:0 28px 20px">'
      + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">'
      + kpiCard(tt('newMrr'), fmt(NEW_MRR), trendUp('8.2'), 'From new customers')
      + kpiCard(tt('expansionMrr'), fmt(EXPANSION_MRR), trendUp('3.1'), 'Upgrades & seats')
      + kpiCard(tt('churnedMrr'), fmt(CHURNED_MRR), trendDown('1.4'), 'Cancellations')
      + kpiCard(tt('netNewMrr'), fmt(NET_NEW_MRR), trendUp(mrrDelta), 'New + Expansion - Churned')
      + '</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
      + chartCard('chartWaterfall', tt('mrrWaterfall'), 220)
      + '<div class="card rounded-xl shadow-sm" style="background:rgba(255,255,255,0.62);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.35);padding:18px">'
      + '<div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:12px">' + tt('cohortRetention') + '</div>'
      + '<div id="cohortTable" style="overflow-x:auto"></div>'
      + '</div>'
      + '</div>'
      + '</div>';
  },

  acquisition: function() {
    return pageHeader(tt('acquisitionTitle'), tt('acquisitionDesc'))
      + '<div style="padding:0 28px 20px">'
      + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">'
      + kpiCard(tt('cac'), fmt(CAC), trendDown('4.2'), 'Cost to acquire 1 customer')
      + kpiCard(tt('ltv'), fmt(LTV), trendUp('6.7'), 'Lifetime value per customer')
      + kpiCard(tt('ltvCacRatio'), LTV_CAC + 'x', trendNeutral(tt('good') + ' > 3x'), 'Payback efficiency')
      + kpiCard(tt('trialConversion'), TRIAL_CONV + '%', trendUp('2.1'), 'Trial \u2192 paid subscribers')
      + '</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'
      + chartCard('chartLtvCac', tt('cacVsLtv'), 220)
      + chartCard('chartFunnel', tt('trialFunnel'), 220)
      + '</div>'
      + '</div>';
  },

  health: function() {
    return pageHeader(tt('healthTitle'), tt('healthDesc'))
      + '<div style="padding:0 28px 20px">'
      + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">'
      + kpiCard(tt('dau'), CURR_DAU, trendUp('3.8'), 'Daily active users')
      + kpiCard(tt('mau'), CURR_MAU, trendUp('7.2'), 'Monthly active users')
      + kpiCard(tt('dauMau'), DAU_MAU + '%', trendNeutral('> 20% ' + tt('good')), 'Engagement ratio')
      + kpiCard(tt('nps'), NPS, trendUp('4'), '> 40 is excellent')
      + '</div>'
      + '<div style="display:grid;grid-template-columns:2fr 1fr;gap:14px">'
      + chartCard('chartDau', tt('dauChart'), 220)
      + chartCard('chartPlans', tt('planDistribution'), 220)
      + '</div>'
      + '</div>';
  }
};

// ===== Chart renderers =====
function destroyCharts() {
  Object.keys(_charts).forEach(function(k) {
    try { _charts[k].destroy(); } catch(e) {}
  });
  _charts = {};
}

var EMERALD = '#10b981';
var EMERALD2 = '#059669';
var EMERALD_LIGHT = 'rgba(16,185,129,0.18)';
var TEAL = '#14b8a6';
var RED = '#ef4444';
var RED_LIGHT = 'rgba(239,68,68,0.18)';
var AMBER = '#f59e0b';
var BLUE = '#3b82f6';

function renderCharts(page) {
  destroyCharts();

  if (page === 'overview') {
    var ctxMrr = document.getElementById('chartMrrTrend');
    var ctxCust = document.getElementById('chartCustomerGrowth');
    if (ctxMrr) {
      _charts.mrr = new Chart(ctxMrr, {
        type: 'line',
        data: {
          labels: MRR_DATA.labels,
          datasets: [{
            label: 'MRR ($)',
            data: MRR_DATA.values,
            borderColor: EMERALD,
            backgroundColor: EMERALD_LIGHT,
            fill: true,
            tension: 0.35,
            pointRadius: 3,
            pointBackgroundColor: EMERALD
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 } } },
            y: {
              grid: { color: 'rgba(0,0,0,0.05)' },
              ticks: { font: { size: 11 }, callback: function(v) { return '$' + (v/1000).toFixed(0) + 'k'; } }
            }
          }
        }
      });
    }
    if (ctxCust) {
      _charts.cust = new Chart(ctxCust, {
        type: 'line',
        data: {
          labels: MRR_DATA.labels,
          datasets: [{
            label: tt('customers'),
            data: CUSTOMER_DATA,
            borderColor: TEAL,
            backgroundColor: 'rgba(20,184,166,0.15)',
            fill: true,
            tension: 0.35,
            pointRadius: 3,
            pointBackgroundColor: TEAL
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 } } },
            y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 } } }
          }
        }
      });
    }
  }

  else if (page === 'growth') {
    var ctxWf = document.getElementById('chartWaterfall');
    if (ctxWf) {
      // Waterfall: New, Expansion, Churned (negative), Net
      _charts.wf = new Chart(ctxWf, {
        type: 'bar',
        data: {
          labels: [tt('waterfallNew'), tt('waterfallExpansion'), tt('waterfallChurned'), tt('waterfallNet')],
          datasets: [{
            label: tt('value'),
            data: [NEW_MRR, EXPANSION_MRR, -CHURNED_MRR, NET_NEW_MRR],
            backgroundColor: [EMERALD, TEAL, RED, EMERALD2],
            borderRadius: 6,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 11 } } },
            y: {
              grid: { color: 'rgba(0,0,0,0.05)' },
              ticks: { font: { size: 11 }, callback: function(v) { return '$' + Math.abs(v/1000).toFixed(1) + 'k'; } }
            }
          }
        }
      });
    }

    // Cohort heatmap (pure HTML/CSS table)
    var tbl = document.getElementById('cohortTable');
    if (tbl) {
      var cohortColLabels = [tt('cohortM0'), tt('cohortM1'), tt('cohortM2'), tt('cohortM3'), tt('cohortM4'), tt('cohortM5')];
      var html = '<table style="border-collapse:separate;border-spacing:3px;font-size:11px">'
        + '<thead><tr><th style="padding:4px 8px;color:#6b7280;font-weight:600;text-align:left">' + tt('cohortLabel') + '</th>'
        + cohortColLabels.map(function(m) {
            return '<th style="padding:4px 6px;color:#6b7280;font-weight:600;text-align:center">' + m + '</th>';
          }).join('')
        + '</tr></thead><tbody>';
      COHORTS.forEach(function(row, ri) {
        html += '<tr><td style="padding:4px 8px;color:#374151;font-weight:600;white-space:nowrap">' + COHORT_MONTHS[ri] + '</td>';
        row.forEach(function(val) {
          if (val === null) {
            html += '<td></td>';
          } else {
            // color: 100% = emerald, 44% = orange-red
            var pct = val / 100;
            var r = Math.round(239 + (16 - 239) * pct);
            var g = Math.round(68 + (185 - 68) * pct);
            var b = Math.round(68 + (129 - 68) * pct);
            html += '<td><div class="cohort-cell" style="background:rgb(' + r + ',' + g + ',' + b + ')">' + val + '%</div></td>';
          }
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      tbl.innerHTML = html;
    }
  }

  else if (page === 'acquisition') {
    var ctxLtv = document.getElementById('chartLtvCac');
    var ctxFunnel = document.getElementById('chartFunnel');
    if (ctxLtv) {
      _charts.ltv = new Chart(ctxLtv, {
        type: 'bar',
        data: {
          labels: [tt('cac'), tt('ltv')],
          datasets: [{
            label: tt('value'),
            data: [CAC, LTV],
            backgroundColor: [RED, EMERALD],
            borderRadius: 8,
            borderSkipped: false,
            barPercentage: 0.45
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(ctx) { return '$' + ctx.parsed.y.toLocaleString(); }
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 12, weight: '600' } } },
            y: {
              grid: { color: 'rgba(0,0,0,0.05)' },
              ticks: { font: { size: 11 }, callback: function(v) { return '$' + v.toLocaleString(); } }
            }
          }
        }
      });
    }
    if (ctxFunnel) {
      var trialStart = 280;
      var engaged = Math.round(trialStart * 0.64);
      var converted = Math.round(trialStart * TRIAL_CONV / 100);
      var expanded = Math.round(converted * 0.24);
      _charts.funnel = new Chart(ctxFunnel, {
        type: 'bar',
        data: {
          labels: [tt('funnelTrialStart'), tt('funnelEngaged'), tt('funnelConversion'), tt('funnelExpanded')],
          datasets: [{
            label: tt('users'),
            data: [trialStart, engaged, converted, expanded],
            backgroundColor: [
              'rgba(16,185,129,0.85)',
              'rgba(20,184,166,0.85)',
              'rgba(5,150,105,0.85)',
              'rgba(16,185,129,0.55)'
            ],
            borderRadius: 6,
            borderSkipped: false
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 } } },
            y: { grid: { display: false }, ticks: { font: { size: 11 } } }
          }
        }
      });
    }
  }

  else if (page === 'health') {
    var ctxDau = document.getElementById('chartDau');
    var ctxPlans = document.getElementById('chartPlans');
    if (ctxDau) {
      var dayLabels = Array.from({length: 30}, function(_, i) { return (i + 1) + ''; });
      _charts.dau = new Chart(ctxDau, {
        type: 'line',
        data: {
          labels: dayLabels,
          datasets: [{
            label: 'DAU',
            data: DAU_SERIES,
            borderColor: EMERALD,
            backgroundColor: EMERALD_LIGHT,
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 4
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 10 }, maxTicksLimit: 10 } },
            y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 11 } } }
          }
        }
      });
    }
    if (ctxPlans) {
      // Plan distribution: Starter/Pro/Enterprise roughly 55/35/10%
      var planStarter = Math.round(CURR_CUSTOMERS * 0.55);
      var planPro = Math.round(CURR_CUSTOMERS * 0.35);
      var planEnt = CURR_CUSTOMERS - planStarter - planPro;
      _charts.plans = new Chart(ctxPlans, {
        type: 'doughnut',
        data: {
          labels: [tt('planStarter'), tt('planPro'), tt('planEnterprise')],
          datasets: [{
            data: [planStarter, planPro, planEnt],
            backgroundColor: [EMERALD_LIGHT.replace('0.18', '0.9'), EMERALD, EMERALD2],
            borderColor: ['rgba(255,255,255,0.8)', 'rgba(255,255,255,0.8)', 'rgba(255,255,255,0.8)'],
            borderWidth: 2
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } }
          },
          cutout: '62%'
        }
      });
    }
  }
}

// ===== Navigation =====
var NAV_PAGES = [
  { id: 'overview', icon: '&#128200;', labelKey: 'navOverview' },
  { id: 'growth', icon: '&#128640;', labelKey: 'navGrowth' },
  { id: 'acquisition', icon: '&#127919;', labelKey: 'navAcquisition' },
  { id: 'health', icon: '&#10084;', labelKey: 'navHealth' }
];

function buildNav() {
  var nav = document.getElementById('nav');
  if (!nav) return;
  nav.innerHTML = NAV_PAGES.map(function(p) {
    return '<button onclick="navigateTo(\'' + p.id + '\')" data-page="' + p.id + '" class="nav-link' + (p.id === currentPage ? ' active' : '') + '">'
      + '<span>' + p.icon + '</span><span>' + tt(p.labelKey) + '</span></button>';
  }).join('');
}

function navigateTo(page) {
  currentPage = page;
  var main = document.getElementById('mainContent');
  if (main) main.innerHTML = pages[page]();
  buildNav();
  setTimeout(function() { renderCharts(page); }, 50);
}

function render() {
  // Sidebar strings
  var st = document.getElementById('sidebarTitle');
  var ss = document.getElementById('sidebarSubtitle');
  if (st) st.textContent = tt('sidebarTitle');
  if (ss) ss.textContent = tt('sidebarSubtitle');
  // Prompt bar
  var pt = document.getElementById('promptText');
  var cb = document.getElementById('ctaBtn');
  if (pt) pt.textContent = tt('promptText');
  if (cb) cb.textContent = tt('ctaBtn');
  // Lang toggle
  var lb = document.getElementById('langBtn');
  if (lb) lb.textContent = tt('langBtn');
  // Navigate to re-render current page
  navigateTo(currentPage);
}

window.addEventListener('DOMContentLoaded', function() {
  if (_isRuBrowser) {
    document.getElementById('langToggle').style.display = '';
    document.getElementById('langBtn').textContent = tt('langBtn');
  }
  render();
});
</script>
