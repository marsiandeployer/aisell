<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectFlow — Kanban Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
    .mini-scroll::-webkit-scrollbar { width: 4px; }
    .mini-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
    .nav-link { display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;text-align:left;border:none;cursor:pointer;background:transparent;color:#94a3b8;transition:background 0.15s,color 0.15s; }
    .nav-link:hover { background:#334155;color:#fff; }
    .nav-link.bg-blue-600 { background:#2563EB !important;color:#fff !important; }
    .filter-btn { padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;cursor:pointer;transition:all 0.15s; }
    .filter-btn.active { background:#2563EB;color:#fff;border-color:#2563EB; }
    .filter-btn:hover:not(.active) { background:#f3f4f6;color:#374151; }
    .kanban-col { min-height:360px; }
    .col-backlog { border-top:4px solid #94a3b8; }
    .col-inprogress { border-top:4px solid #3b82f6; }
    .col-review { border-top:4px solid #f59e0b; }
    .col-done { border-top:4px solid #22c55e; }
    .card-selected { border-left:3px solid #3b82f6 !important;background:#eff6ff !important; }
    .timer-font { font-family:'Courier New',Courier,monospace; }
    .pulse-dot { animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .progress-bar { transition:width 0.6s ease; }
  
    /* === Background Image (AI-generated) === */
    #mainContent { background: url('dashboard-bg.jpg') center/cover no-repeat fixed !important; }
    .bg-gray-50, .bg-gray-100, .bg-gray-200 { background: transparent !important; }
    .bg-amber-50, .bg-orange-50, .bg-blue-50, .bg-purple-50, .bg-green-50 { background: transparent !important; }
    .bg-white { background: rgba(255,255,255,0.62) !important; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.35) !important; }
    .kpi-card { background: rgba(255,255,255,0.62) !important; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .card { background: rgba(255,255,255,0.62) !important; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
      </style>
</head>
<body class="bg-gray-100" style="margin:0;overflow:hidden">

  <!-- Prompt bar -->
  <div id="promptBar" style="position:fixed;bottom:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:center;gap:24px;padding:22px 40px;background:linear-gradient(135deg,rgba(15,23,42,0.97),rgba(30,58,138,0.97));backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#fff;font-size:22px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,0.5);border-top:1px solid rgba(255,255,255,0.1);transition:transform 0.3s ease">
    <span id="promptText"></span>
    <a id="ctaBtn" style="flex-shrink:0;padding:14px 32px;background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;text-decoration:none;white-space:nowrap;box-shadow:0 4px 16px rgba(59,130,246,0.5);letter-spacing:0.01em" href="#"></a>
  </div>

  <div class="flex" style="height:100vh">
    <!-- Sidebar -->
    <aside class="flex flex-col flex-shrink-0 text-white" style="width:200px;background:linear-gradient(rgba(17,24,39,0.85),rgba(17,24,39,0.92)),url('dashboard-bg.jpg') center/cover no-repeat">
      <!-- Logo -->
      <div class="px-4 pt-5 pb-4 border-b border-slate-700">
        <div class="text-base font-bold flex items-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>ProjectFlow</span>
        </div>
        <div class="text-xs text-slate-400 mt-0.5" id="sidebarSub"></div>
      </div>
      <!-- Nav -->
      <nav class="px-2 py-3 space-y-0.5">
        <button onclick="navigateTo('projects')" data-page="projects" data-nav="navProjects" data-icon="📋" class="nav-link">📋 <span></span></button>
        <button onclick="navigateTo('tasks')"    data-page="tasks"    data-nav="navTasks"    data-icon="✅" class="nav-link">✅ <span></span></button>
        <button onclick="navigateTo('calendar')" data-page="calendar" data-nav="navCalendar" data-icon="📅" class="nav-link">📅 <span></span></button>
        <button onclick="navigateTo('reports')"  data-page="reports"  data-nav="navReports"  data-icon="📊" class="nav-link">📊 <span></span></button>
      </nav>
      <!-- Projects list -->
      <div class="px-3 py-3 border-t border-slate-700 flex-1">
        <div class="text-xs font-semibold text-slate-500 uppercase mb-2 px-1">Projects</div>
        <div class="space-y-1">
          <div class="flex items-center gap-2 px-1 py-1 rounded hover:bg-slate-700 cursor-pointer">
            <span style="width:8px;height:8px;border-radius:50%;background:#3b82f6;flex-shrink:0"></span>
            <span class="text-xs text-slate-300 truncate">Website Redesign</span>
          </div>
          <div class="flex items-center gap-2 px-1 py-1 rounded hover:bg-slate-700 cursor-pointer">
            <span style="width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0"></span>
            <span class="text-xs text-slate-300 truncate">Mobile App v2</span>
          </div>
          <div class="flex items-center gap-2 px-1 py-1 rounded hover:bg-slate-700 cursor-pointer">
            <span style="width:8px;height:8px;border-radius:50%;background:#f59e0b;flex-shrink:0"></span>
            <span class="text-xs text-slate-300 truncate">Brand Identity</span>
          </div>
        </div>
      </div>
      <!-- Lang toggle -->
      <div id="langToggle" style="display:none" class="px-2 py-3 border-t border-slate-700">
        <button onclick="toggleLang()" class="w-full text-left px-3 py-2 rounded text-slate-400 hover:text-white hover:bg-slate-700 transition text-xs flex items-center gap-2" id="langBtn">
          <img id="langFlag" src="" width="16" height="12" style="border-radius:2px">
          <span id="langLabel"></span>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-auto mini-scroll" style="padding:18px 20px 80px 20px" id="mainContent">
    </main>
  </div>

        priority: '\u041f\u0440\u0438\u043e\u0440\u0438\u0442\u0435\u0442',
        onTimeRate: '\u0412\u043e\u0432\u0440\u0435\u043c\u044f',
        avgTaskTime: '\u0421\u0440. \u0432\u0440\u0435\u043c\u044f \u0437\u0430\u0434\u0430\u0447\u0438',
        teamVelocity: '\u0421\u043a\u043e\u0440\u043e\u0441\u0442\u044c \u043a\u043e\u043c\u0430\u043d\u0434\u044b',
        completedTasks: '\u0417\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u043e \u0437\u0430\u0434\u0430\u0447',
        promptText: '\u0423\u043f\u0440\u0430\u0432\u043b\u044f\u0439\u0442\u0435 \u043f\u0440\u043e\u0435\u043a\u0442\u0430\u043c\u0438 \u0441 AI \u2014 \u0430\u0432\u0442\u043e\u043c\u0430\u0442\u0438\u0437\u0430\u0446\u0438\u044f \u0437\u0430\u0434\u0430\u0447 \u0438 \u0441\u0440\u043e\u043a\u043e\u0432',
        ctaBtn: '\u041f\u043e\u043f\u0440\u043e\u0431\u043e\u0432\u0430\u0442\u044c',
        taskName: '\u0417\u0430\u0434\u0430\u0447\u0430',

        filterWeek: '\u041d\u0435\u0434\u0435\u043b\u044f',
        filterOverdue: '\u041f\u0440\u043e\u0441\u0440\u043e\u0447\u0435\u043d\u043e',

        completedTasksLabel: '\u0417\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u043e',
        statusChart: '\u0417\u0430\u0434\u0430\u0447\u0438 \u043f\u043e \u0441\u0442\u0430\u0442\u0443\u0441\u0443',
        velocityChart: '\u0421\u043a\u043e\u0440\u043e\u0441\u0442\u044c \u043f\u043e \u043d\u0435\u0434\u0435\u043b\u044f\u043c',
        topProjects: '\u0422\u043e\u043f \u043f\u0440\u043e\u0435\u043a\u0442\u044b',
        projectsTitle: 'Website Redesign',
        analyticsTitle: '\u0410\u043d\u0430\u043b\u0438\u0442\u0438\u043a\u0430 \u043f\u0440\u043e\u0435\u043a\u0442\u0430',
        months: ['\u042f\u043d\u0432','\u0424\u0435\u0432','\u041c\u0430\u0440','\u0410\u043f\u0440','\u041c\u0430\u0439','\u0418\u044e\u043d','\u0418\u044e\u043b','\u0410\u0432\u0433'],
        weeks: ['\u041d1','\u041d2','\u041d3','\u041d4','\u041d5','\u041d6','\u041d7','\u041d8'],
        days: ['\u0412\u0441','\u041f\u043d','\u0412\u0442','\u0421\u0440','\u0427\u0442','\u041f\u0442','\u0421\u0431']
      }
    };

    var _lang = 'en';
    var _isRuBrowser = (navigator.language || '').toLowerCase().startsWith('ru');
    if (_isRuBrowser) {
      _lang = 'ru';
      try { var _stored = localStorage.getItem('demo_lang'); if (_stored === 'en' || _stored === 'ru') _lang = _stored; } catch(_e) {}
    }
    function tt(key) { return (_s[_lang] && _s[_lang][key]) || _s.en[key] || key; }
    function toggleLang() {
      _lang = _lang === 'ru' ? 'en' : 'ru';
      try { localStorage.setItem('demo_lang', _lang); } catch(_e) {}
      renderAll();
      navigateTo(currentPage);
    }

    // ===== Helpers =====
    function avatar(initials, color) {
      return '<span style="width:26px;height:26px;border-radius:50%;background:' + color + ';display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">' + initials + '</span>';
    }
    function priorityBadge(p) {
      var map = { high: ['bg-red-100 text-red-600', tt('high')], medium: ['bg-yellow-100 text-yellow-600', tt('medium')], low: ['bg-gray-100 text-gray-500', tt('low')] };
      var m = map[p] || map.low;
      return '<span class="px-2 py-0.5 rounded text-xs font-semibold ' + m[0] + '">' + m[1] + '</span>';
    }
    function statusBadge(s) {
      var map = {
        backlog:    ['bg-gray-100 text-gray-500',    tt('backlog')],
        inProgress: ['bg-blue-100 text-blue-600',    tt('inProgress')],
        review:     ['bg-yellow-100 text-yellow-600',tt('review')],
        done:       ['bg-green-100 text-green-600',  tt('done')],
        overdue:    ['bg-red-100 text-red-600',      tt('overdue')]
      };
      var m = map[s] || map.backlog;
      return '<span class="px-2 py-0.5 rounded text-xs font-semibold ' + m[0] + '">' + m[1] + '</span>';
    }
    function kpiCard(label, value, delta, positive, colorClass, icon) {
      var deltaColor = positive ? 'text-green-500' : 'text-red-500';
      var arrow = positive ? '&#8679;' : '&#8681;';
      return '<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3">' +
        '<div class="flex items-center justify-between mb-1">' +
          '<span class="text-xs text-gray-500">' + label + '</span>' +
          '<span class="text-lg">' + icon + '</span>' +
        '</div>' +
        '<div class="text-2xl font-bold ' + colorClass + ' mb-0.5">' + value + '</div>' +
        '<div class="text-xs ' + deltaColor + '">' + arrow + ' ' + delta + '</div>' +
      '</div>';
    }

    // ===== Pages =====
    var currentPage = 'projects';
    var _charts = {};

    var pages = {

      // ============================
      // PROJECTS — Kanban Board
      // ============================
      projects: function() {
        var backlogCards = [
          { id: 'bl1', title: 'Mobile Responsive Layout', priority: 'medium', assignee: 'SC', color: '#10b981', due: 'Mar 20' },
          { id: 'bl2', title: 'SEO Optimization', priority: 'low', assignee: 'MR', color: '#f59e0b', due: 'Mar 25' },
          { id: 'bl3', title: 'Analytics Integration', priority: 'medium', assignee: 'AP', color: '#8b5cf6', due: 'Apr 1' }
        ];
        var inProgCards = [
          { id: 'ip1', title: 'Build API Integration', priority: 'high', assignee: 'JS', color: '#3b82f6', due: 'Mar 15', selected: true },
          { id: 'ip2', title: 'Design System Components', priority: 'medium', assignee: 'SC', color: '#10b981', due: 'Mar 18' },
          { id: 'ip3', title: 'Performance Optimization', priority: 'high', assignee: 'MR', color: '#f59e0b', due: 'Mar 12', timer: true }
        ];
        var reviewCards = [
          { id: 'rv1', title: 'User Auth Flow', priority: 'high', assignee: 'AP', color: '#8b5cf6', due: 'Mar 10' },
          { id: 'rv2', title: 'Database Schema', priority: 'medium', assignee: 'JS', color: '#3b82f6', due: 'Mar 11' }
        ];
        var doneCards = [
          { id: 'dn1', title: 'Project Kickoff', priority: 'high', assignee: 'JS', color: '#3b82f6', due: 'Feb 1' },
          { id: 'dn2', title: 'Wireframe Design', priority: 'medium', assignee: 'SC', color: '#10b981', due: 'Feb 10' },
          { id: 'dn3', title: 'Brand Guidelines', priority: 'low', assignee: 'AP', color: '#8b5cf6', due: 'Feb 15' },
          { id: 'dn4', title: 'Tech Stack Decision', priority: 'medium', assignee: 'MR', color: '#f59e0b', due: 'Feb 20' }
        ];

        function cardHtml(c, colClass) {
          var isDone = colClass === 'done';
          var titleStyle = isDone ? 'text-decoration:line-through;color:#9ca3af' : '';
          var wrapStyle = isDone ? 'opacity:0.7' : '';
          var selectedClass = c.selected ? 'card-selected' : '';
          var timerBadge = c.timer
            ? '<span style="background:#fee2e2;color:#dc2626;border-radius:12px;padding:1px 7px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px">' +
              '<span class="pulse-dot" style="width:6px;height:6px;border-radius:50%;background:#dc2626;display:inline-block"></span>02:14:33</span>'
            : '';
          return '<div class="bg-white rounded-lg p-2.5 shadow-sm border border-gray-100 ' + selectedClass + '" style="' + wrapStyle + '">' +
            '<div class="flex items-start justify-between gap-1 mb-1.5">' +
              '<span class="text-xs font-semibold text-gray-800 leading-tight flex-1" style="' + titleStyle + '">' + c.title + '</span>' +
              priorityBadge(c.priority) +
            '</div>' +
            '<div class="flex items-center justify-between">' +
              '<div class="flex items-center gap-1.5">' +
                avatar(c.assignee, c.color) +
                '<span class="text-xs text-gray-400">' + c.due + '</span>' +
              '</div>' +
              timerBadge +
            '</div>' +
          '</div>';
        }

        function colHtml(titleKey, cls, cards, count) {
          var colors = { backlog: '#94a3b8', inProgress: '#3b82f6', review: '#f59e0b', done: '#22c55e' };
          var col = cls.replace('col-','').replace('inprogress','inProgress');
          var c = colors[col] || '#94a3b8';
          return '<div class="bg-gray-50 rounded-xl border border-gray-200 ' + cls + ' kanban-col" style="flex:1;min-width:0">' +
            '<div class="px-3 py-2.5 flex items-center justify-between">' +
              '<span class="text-xs font-semibold text-gray-700">' + tt(titleKey) + '</span>' +
              '<span class="text-xs font-bold px-2 py-0.5 rounded-full text-white" style="background:' + c + '">' + count + '</span>' +
            '</div>' +
            '<div class="px-2 pb-2 space-y-2">' + cards.map(function(c2) { return cardHtml(c2, col); }).join('') + '</div>' +
          '</div>';
        }

        var kanban = '<div class="flex gap-3" style="min-width:0">' +
          colHtml('backlog',    'col-backlog',    backlogCards, backlogCards.length) +
          colHtml('inProgress', 'col-inprogress', inProgCards,  inProgCards.length) +
          colHtml('review',     'col-review',     reviewCards,  reviewCards.length) +
          colHtml('done',       'col-done',       doneCards,    doneCards.length) +
        '</div>';

        var subtasks = [
          { text: 'Set up OAuth2 endpoints', done: true },
          { text: 'Write unit tests for auth', done: true },
          { text: 'Integrate Stripe webhook', done: false },
          { text: 'Error handling & retries', done: false },

      calendar: function() {
        // Feb-Mar 2026: Feb 1 = Sunday (day 0)

          25: [{ label: 'Today',             color: '#2563eb' }],
          28: [{ label: 'Color Palette',     color: '#3b82f6' }]
        };

        // Feb 2026: starts Sunday (0), 28 days
        // We show 5 weeks: Jan 25 - Mar 7
        var days = tt('days');
        var headerRow = days.map(function(d) {
          return '<div class="text-center text-xs font-semibold text-gray-400 py-2">' + d + '</div>';
        }).join('');

        // Build calendar cells: week starts Sunday
        // Feb 1 2026 = Sunday → offset 0
        var cells = [];
        // Jan 25-31 (prev month) = 0 cells before (Feb starts Sunday)
        // Actually Feb 1 = day index 0 (Sun). We show from Feb 1.
        // 5 weeks = 35 cells. Feb has 28 days → 7 days left from March.
        for (var i = 0; i < 35; i++) {
          var dayNum = i + 1; // Feb 1..28, then Mar 1..7
          var isFebruary = dayNum <= 28;
          var isMarch = dayNum > 28;
          var marchDay = dayNum - 28;
          var displayNum = isFebruary ? dayNum : marchDay;
          var isToday = isFebruary && dayNum === 25;
          var pills = (isFebruary && taskPills[dayNum]) ? taskPills[dayNum] : [];
          var numStyle = isToday
            ? 'background:#2563EB;color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-weight:700'
            : (isMarch ? 'color:#9ca3af' : 'color:#374151');
          cells.push(
            '<div class="border border-gray-100 bg-white p-1.5" style="min-height:64px">' +
              '<div class="text-xs mb-1 font-medium" style="' + numStyle + '">' + displayNum + '</div>' +
              pills.map(function(p) {
                return '<div class="text-xs rounded px-1 py-0.5 mb-0.5 truncate font-medium" style="background:' + p.color + '22;color:' + p.color + ';font-size:10px">' + p.label + '</div>';
              }).join('') +
            '</div>'
          );
        }

        var legend = [
          { color: '#3b82f6', label: 'Website Redesign' },
          { color: '#10b981', label: 'Mobile App v2' },
          { color: '#f59e0b', label: 'Brand Identity' },
          { color: '#8b5cf6', label: 'User Auth' }
        ];

        return '<div class="flex items-center justify-between mb-4">' +
          '<h1 class="text-xl font-bold text-gray-900">February \u2013 March 2026</h1>' +
          '<div class="flex gap-2">' +
            '<button class="px-3 py-1.5 rounded-lg bg-white border border-gray-200 text-xs font-semibold text-gray-600 hover:bg-gray-50 transition">&#8592; Prev</button>' +
            '<button class="px-3 py-1.5 rounded-lg bg-white border border-gray-200 text-xs font-semibold text-gray-600 hover:bg-gray-50 transition">Next &#8594;</button>' +
          '</div>' +
        '</div>' +
        '<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-3">' +
          '<div class="grid grid-cols-7 border-b border-gray-100 bg-gray-50">' + headerRow + '</div>' +
          '<div class="grid grid-cols-7">' + cells.join('') + '</div>' +
        '</div>' +
        '<div class="flex gap-4">' +
          legend.map(function(l) {
            return '<div class="flex items-center gap-1.5">' +
              '<span style="width:10px;height:10px;border-radius:3px;background:' + l.color + ';flex-shrink:0"></span>' +
              '<span class="text-xs text-gray-500">' + l.label + '</span>' +

          }).join('') +

    // ===== Charts =====
    function renderCharts(page) {
      Object.keys(_charts).forEach(function(k) {
        try { _charts[k].destroy(); } catch(e) {}
      });
      _charts = {};

      if (page !== 'reports') return;

      var sc = document.getElementById('statusChart');
      if (sc) {
        _charts.status = new Chart(sc, {
          type: 'bar',
          data: {
            labels: [tt('backlog'), tt('inProgress'), tt('review'), tt('done'), tt('overdue')],
            datasets: [{
              label: 'Tasks',
              data: [8, 6, 4, 12, 3],
              backgroundColor: ['#94a3b8','#3b82f6','#f59e0b','#22c55e','#ef4444'],
              borderRadius: 5,
              borderSkipped: false
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              y: { grid: { color: '#f3f4f6' }, ticks: { font: { size: 10 } }, beginAtZero: true },
              x: { grid: { display: false }, ticks: { font: { size: 10 } } }
            }
          }
        });
      }

      var vc = document.getElementById('velocityChart');
      if (vc) {
        _charts.velocity = new Chart(vc, {
          type: 'line',
          data: {
            labels: tt('weeks'),
            datasets: [{
              label: 'Tasks completed',
              data: [18, 22, 19, 25, 21, 28, 24, 30],
              borderColor: '#3b82f6',
              backgroundColor: 'rgba(59,130,246,0.1)',
              tension: 0.4,
              fill: true,
              pointBackgroundColor: '#3b82f6',
              pointRadius: 4
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              y: { grid: { color: '#f3f4f6' }, ticks: { font: { size: 10 } }, beginAtZero: true },
              x: { grid: { display: false }, ticks: { font: { size: 10 } } }
            }
          }
        });
      }
    }

    // ===== Navigation =====
    function navigateTo(page) {
      currentPage = page;
      document.getElementById('mainContent').innerHTML = pages[page]();
      document.querySelectorAll('.nav-link').forEach(function(link) {
        if (link.dataset.page === page) {
          link.classList.add('bg-blue-600');
        } else {
          link.classList.remove('bg-blue-600');
        }
      });
      setTimeout(function() { renderCharts(page); }, 50);
    }

    // ===== renderAll: update all translatable chrome elements =====
	    function renderAll() {
	      var prompt = tt('promptText');
	      var ctaBtn = document.getElementById('ctaBtn');
	      document.getElementById('promptText').textContent = prompt;
	      ctaBtn.textContent = tt('ctaBtn');
	      ctaBtn.href = '/?start=example_project-kanban&prompt=' + encodeURIComponent(prompt);
	      ctaBtn.onclick = function(e) {
	        var insideIframe = false;
	        try { insideIframe = window.parent && window.parent !== window; } catch (_e) {}
	        if (insideIframe) {
	          e.preventDefault();
	          try {
	            window.parent.postMessage({ type: 'open_webchat_prompt', prompt: prompt }, '*');
	          } catch (_e) {}
	          return;
	        }
	        var extId = '';
	        try { extId = String(new URLSearchParams(window.location.search).get('ext_id') || '').trim(); } catch (_e) {}
	        if (!extId) return;
	        try {
	          if (window.chrome && chrome.runtime && typeof chrome.runtime.sendMessage === 'function') {
	            e.preventDefault();
	            chrome.runtime.sendMessage(extId, { type: 'open_webchat_prompt', prompt: prompt });
	          }
	        } catch (_e) {}
	      };
	      document.getElementById('sidebarSub').textContent = tt('sidebarSub');
	      document.querySelectorAll('.nav-link[data-nav]').forEach(function(navBtn) {
	        navBtn.innerHTML = navBtn.dataset.icon + ' ' + tt(navBtn.dataset.nav);
	      });
      if (_isRuBrowser) {
        document.getElementById('langToggle').style.display = '';
        var isRu = _lang === 'ru';
        document.getElementById('langFlag').src = isRu ? 'https://flagcdn.com/w20/gb.png' : 'https://flagcdn.com/w20/ru.png';
        document.getElementById('langLabel').textContent = isRu ? 'English' : '\u0420\u0443\u0441\u0441\u043a\u0438\u0439';
      }
    }

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', function() {
      renderAll();
      navigateTo('projects');
    });
  </script>
