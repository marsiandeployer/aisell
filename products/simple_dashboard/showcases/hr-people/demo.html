function kpiCard(label, value, sub, trend) {
  var trendHtml = '';
  if (trend > 0) trendHtml = '<span style="color:#10b981;font-size:11px;font-weight:600">\u25b2 +' + trend + '%</span>';
  else if (trend < 0) trendHtml = '<span style="color:#ef4444;font-size:11px;font-weight:600">\u25bc ' + trend + '%</span>';
  else trendHtml = '<span style="color:#6b7280;font-size:11px">&mdash;</span>';
  return '<div class="kpi-card rounded-xl p-4 shadow-sm">'
    + '<div style="font-size:12px;font-weight:500;color:#6b7280;margin-bottom:4px">' + label + '</div>'
    + '<div style="font-size:26px;font-weight:800;color:#1e1b4b;line-height:1.1">' + value + '</div>'
    + '<div style="margin-top:4px;display:flex;align-items:center;gap:6px">' + trendHtml
    + '<span style="font-size:11px;color:#9ca3af">' + sub + '</span></div>'
    + '</div>';
}

function sectionTitle(text) {
  return '<h2 style="font-size:15px;font-weight:700;color:#1e1b4b;margin:0 0 10px 0">' + text + '</h2>';
}

// ===== Page: Overview =====
function pageOverview() {
  var hc = _data.headcount;
  var latest = hc[hc.length - 1];
  var prev = hc[hc.length - 2];
  var hcDelta = Math.round((latest - prev) / prev * 100);
  var months = tt('months');
  var depts = [tt('deptEng'), tt('deptSales'), tt('deptMkt'), tt('deptOps'), tt('deptHR'), tt('deptFin')];

  return '<div class="fade-in p-5">'
    // KPI row
    + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">'
    + kpiCard(tt('totalHeadcount'), latest + ' <span style="font-size:14px;font-weight:400;color:#6b7280">' + tt('employees') + '</span>', tt('vsLastMonth'), hcDelta)
    + kpiCard(tt('turnoverRate'), '14.2%', tt('annually'), -2)
    + kpiCard(tt('openPositions'), '11', tt('vsLastMonth'), 0)
    + kpiCard(tt('avgTenure'), '2.8 <span style="font-size:14px;font-weight:400;color:#6b7280">' + tt('years') + '</span>', tt('vsLastMonth'), 0)
    + '</div>'
    // Charts row
    + '<div style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px">'
    // Headcount trend
    + '<div class="bg-white rounded-xl p-4 shadow-sm">'
    + sectionTitle(tt('headcountTrend'))
    + '<canvas id="chartHcTrend" height="120"></canvas>'
    + '</div>'
    // Dept breakdown
    + '<div class="bg-white rounded-xl p-4 shadow-sm">'
    + sectionTitle(tt('headcountByDept'))
    + '<canvas id="chartDeptBar" height="120"></canvas>'
    + '</div>'
    + '</div>'
    + '</div>';
}

function renderChartsOverview() {
  destroyCharts(['chartHcTrend', 'chartDeptBar']);
  var months = tt('months');
  var depts = [tt('deptEng'), tt('deptSales'), tt('deptMkt'), tt('deptOps'), tt('deptHR'), tt('deptFin')];
  var purple = '#a855f7';
  var purpleLight = 'rgba(168,85,247,0.15)';

  _charts['chartHcTrend'] = new Chart(document.getElementById('chartHcTrend'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [{
        label: tt('totalHeadcount'),
        data: _data.headcount,
        borderColor: purple,
        backgroundColor: purpleLight,
        fill: true,
        tension: 0.4,
        pointBackgroundColor: purple,
        pointRadius: 3
      }]
    },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
  });

  _charts['chartDeptBar'] = new Chart(document.getElementById('chartDeptBar'), {
    type: 'bar',
    data: {
      labels: depts,
      datasets: [{
        label: tt('employees'),
        data: _data.deptHeadcount,

// ===== SPA Core =====
function destroyCharts(ids) {
  ids.forEach(function(id) {
    if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
  });
}

var _pages = {
  overview: { render: pageOverview, charts: renderChartsOverview },
  hiring:   { render: pageHiring,   charts: renderChartsHiring },
  retention:{ render: pageRetention,charts: renderChartsRetention },
  teams:    { render: pageTeams,    charts: renderChartsTeams }
};

var _navDefs = [
  { id: 'overview',   icon: '&#128200;', key: 'navOverview' },
  { id: 'hiring',     icon: '&#128640;', key: 'navHiring' },
  { id: 'retention',  icon: '&#128196;', key: 'navRetention' },
  { id: 'teams',      icon: '&#128101;', key: 'navTeams' }
];

function buildNav() {
  var nav = document.getElementById('nav');
  nav.innerHTML = _navDefs.map(function(n) {
    return '<button onclick="navigateTo(\'' + n.id + '\')" id="nav_' + n.id + '" class="nav-link' + (n.id === _currentPage ? ' active' : '') + '">'
      + '<span>' + n.icon + '</span><span>' + tt(n.key) + '</span></button>';
  }).join('');
}

function navigateTo(page) {
  _currentPage = page;
  buildNav();
  var mc = document.getElementById('mainContent');
  mc.innerHTML = _pages[page].render();
  setTimeout(function() { _pages[page].charts(); }, 50);
}

// ===== Init =====
window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('sidebarTitle').textContent = tt('sidebarTitle');
  document.getElementById('sidebarSubtitle').textContent = tt('sidebarSubtitle');
  document.getElementById('promptText').textContent = tt('promptText');
  document.getElementById('ctaBtn').textContent = tt('ctaBtn');

  if (_isRuBrowser) {
    document.getElementById('langToggle').style.display = '';
    document.getElementById('langBtn').textContent = tt('langBtn');
  }

  buildNav();
  navigateTo('overview');
});
</script>
