<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, initial-scale=1" />
    <title>Promo Preview - Hair Salon Booking</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1280px;
        height: 800px;
        overflow: hidden;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }
      body {
        background:
          radial-gradient(circle at 8% 8%, rgba(102, 126, 234, 0.32), transparent 28%),
          radial-gradient(circle at 82% 80%, rgba(118, 75, 162, 0.28), transparent 36%),
          linear-gradient(130deg, #101827 0%, #0f1e2a 55%, #142331 100%);
        color: #eaf0f8;
      }
      .browser {
        width: 1240px;
        height: 760px;
        margin: 20px auto;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.22);
        box-shadow: 0 35px 80px rgba(0,0,0,0.45);
        background: #0f1722;
      }
      .topbar {
        height: 52px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 18px;
        background: linear-gradient(180deg, #e8edf5 0%, #d5deeb 100%);
        border-bottom: 1px solid #bfcbdc;
      }
      .dot { width: 11px; height: 11px; border-radius: 50%; }
      .r { background: #ff5f57; }
      .y { background: #febb2e; }
      .g { background: #28c840; }
      .url {
        margin-left: 8px;
        flex: 1;
        height: 31px;
        border-radius: 9px;
        border: 1px solid #bccadd;
        background: #f9fbff;
        color: #4a5c75;
        display: flex;
        align-items: center;
        padding: 0 13px;
        font-size: 13px;
        font-weight: 600;
      }
      .body {
        display: grid;
        grid-template-columns: 67% 33%;
        height: calc(100% - 52px);
      }
      .left {
        border-right: 1px solid rgba(255,255,255,0.12);
        overflow: hidden;
      }
      .left iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
      .right {
        background: #dce6f5;
        padding: 10px;
      }
      .chat-frame {
        width: 100%;
        height: 100%;
        border: 1px solid #c1cfe2;
        border-radius: 12px;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="browser">
      <div class="topbar">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
        <div class="url">https://d999999999.habab.ru/</div>
      </div>

      <div class="body">
        <section class="left">
          <iframe src="http://localhost:8091/preview"></iframe>
        </section>

        <aside class="right">
          <iframe class="chat-frame" src="http://localhost:8091/" allow="clipboard-read; clipboard-write"></iframe>
        </aside>
      </div>
    </div>
  </body>
</html>
